const FB_URL=`https://firestore.googleapis.com/v1/projects/${FB_CONFIG.projectId}/databases/(default)/documents/kv`;

const DB={
  _lsGet(k){try{const v=localStorage.getItem('rv_'+k);return v?JSON.parse(v):null;}catch{return null;}},
  _lsSet(k,v){try{localStorage.setItem('rv_'+k,JSON.stringify(v));}catch{}},
  _lsDel(k){try{localStorage.removeItem('rv_'+k);}catch{}},

  _fromFS(fields){
    if(!fields)return null;
    const v=fields.value;
    if(!v)return null;
    const raw=v.stringValue||null;
    if(!raw)return null;
    try{return JSON.parse(raw);}catch{return null;}
  },
  _toFS(val){
    return {fields:{value:{stringValue:JSON.stringify(val)}}};
  },

  async get(k){
    try{
      const r=await fetch(`${FB_URL}/${encodeURIComponent(k)}`,{
        headers:{'Content-Type':'application/json'},
        cache:'no-store'
      });
      if(r.status===404)return this._lsGet(k);
      if(!r.ok)throw 0;
      const d=await r.json();
      const val=this._fromFS(d.fields);
      if(val!==null){this._lsSet(k,val);return val;}
    }catch{}
    return this._lsGet(k);
  },

  async set(k,val){
    // Always save to localStorage first
    this._lsSet(k,val);
    // Try Firebase up to 3 times
    for(let i=0;i<3;i++){
      try{
        const r=await fetch(`${FB_URL}/${encodeURIComponent(k)}?updateMask.fieldPaths=value`,{
          method:'PATCH',
          headers:{'Content-Type':'application/json'},
          body:JSON.stringify(this._toFS(val))
        });
        if(r.ok)return true; // success
        if(r.status===404){
          // Document doesn't exist yet — create it
          const r2=await fetch(FB_URL,{
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({...this._toFS(val),name:`${FB_URL}/${k}`})
          });
          if(r2.ok)return true;
        }
      }catch{}
      await new Promise(res=>setTimeout(res,500*(i+1)));
    }
    return false;
  }
};

const fmt=n=>'₦'+(n||0).toLocaleString('en-NG');
const fmtDate=s=>{if(!s)return'';try{return new Date(s).toLocaleDateString('en-NG',{day:'2-digit',month:'short',year:'numeric'});}catch{return s;}};
const fmtTime=s=>{if(!s)return'';try{return new Date(s).toLocaleTimeString('en-NG',{hour:'2-digit',minute:'2-digit'});}catch{return s;}};
function genCode(role,users){
  const pfx=PREFIXES[role]||'XX';
  let max=0;
  Object.values(users||{}).forEach(u=>{if(u.role===role&&u.code){const n=parseInt((u.code||'').replace(pfx,''));if(!isNaN(n)&&n>max)max=n;}});
  return pfx+String(max+1).padStart(3,'0');
}
function calcNet(signups,deductions,bonuses){
  const s=signups||0;
  const gross=(Math.min(s,50)*500)+(Math.max(0,s-50)*700);
  const totalDed=(deductions||[]).reduce((a,d)=>a+(d.amount||0),0);
  const totalBon=(bonuses||[]).reduce((a,b)=>a+(b.amount||0),0);
  return{gross,totalDed,totalBon,net:gross-totalDed+totalBon};
}
function getMonthRange(){
  const now=new Date();
  const start=new Date(now.getFullYear(),now.getMonth(),1).toISOString().split('T')[0];
  const end=new Date(now.getFullYear(),now.getMonth()+1,0).toISOString().split('T')[0];
  return{start,end,endDate:new Date(now.getFullYear(),now.getMonth()+1,0)};
}
function monthEndsIn(){
  const now=new Date();
  const endOfMonth=new Date(now.getFullYear(),now.getMonth()+1,0,23,59,59);
  const diff=endOfMonth-now;
  if(diff<=0)return'Month ended';
  const d=Math.floor(diff/86400000);
  const h=Math.floor((diff%86400000)/3600000);
  const m=Math.floor((diff%3600000)/60000);
  const s=Math.floor((diff%60000)/1000);
  return`${d}d ${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function StudentReg({settings,saveSignups,signups,onNavigate}){
  const refCode=sessionStorage.getItem('ref_code')||'';
  const [form,setForm]=useState({name:'',phone:'',email:'',siteName:'',ref:refCode});
  const [err,setErr]=useState('');const [done,setDone]=useState(false);
  const set=k=>e=>setForm(f=>({...f,[k]:e.target.value}));
  const s=settings||DEFAULT_SETTINGS;
  const [step,setStep]=useState('form'); // form | pay
  const [savedId,setSavedId]=useState('');
  const submit=async()=>{
    if(!form.name||!form.phone||!form.email||!form.siteName){setErr('All fields are required');return;}
    // Save the signup record first, then proceed to payment
    const id='SU_'+Date.now();
    await saveSignups([...signups,{id,...form,date:TODAY,receiptForwarded:false,pfcStatus:'Pending',siteBuilt:false,paymentStatus:'pending'}]);
    setSavedId(id);
    setStep('pay');
  };
  const launchPaystack=()=>{
    const key=(s&&s.paystackKey)||'';
    if(!key){alert('Payment gateway not configured. Please pay via bank transfer below.');return;}
    if(typeof PaystackPop==='undefined'){
      // Load Paystack script dynamically
      const script=document.createElement('script');
      script.src='https://js.paystack.co/v1/inline.js';
      script.onload=()=>initPaystack(key);
      document.head.appendChild(script);
      return;
    }
    initPaystack(key);
  };
  const initPaystack=async(key)=>{
    const handler=window.PaystackPop.setup({
      key,
      email:form.email,
      amount:200000, // ₦2,000 in kobo
      currency:'NGN',
      ref:'REHOVTU_'+savedId,
      metadata:{name:form.name,phone:form.phone,siteName:form.siteName,ref:form.ref},
      callback:async response=>{
        // Payment successful — update the signup record
        const updated=signups.map(s=>s.id===savedId?{...s,paymentStatus:'paid',paystackRef:response.reference,paidAt:new Date().toISOString()}:s);
        await saveSignups(updated);
        setDone(true);
      },
      onClose:()=>{}
    });
    handler.openIframe();
  };
  // ── PAYMENT SCREEN ──
  if(step==='pay'&&!done)return(
    <div style={{minHeight:'100vh',background:'var(--bg)',padding:20,display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div className="fade-up" style={{background:'#fff',borderRadius:20,padding:28,maxWidth:440,width:'100%',textAlign:'center',boxShadow:'var(--shadow)'}}>
        <div style={{fontSize:48,marginBottom:12}}>💳</div>
        <div style={{fontWeight:800,fontSize:20,marginBottom:4,color:'var(--blue)'}}>Complete Payment</div>
        <div style={{color:'var(--muted)',fontSize:14,marginBottom:20}}>One final step — pay ₦2,000 to activate your VTU site.</div>
        <div style={{background:'#f1f5f9',borderRadius:12,padding:'14px',marginBottom:16,textAlign:'left'}}>
          <div style={{fontSize:12,color:'var(--muted)',marginBottom:6}}>YOUR DETAILS</div>
          <div style={{fontSize:14,fontWeight:600}}>{form.name}</div>
          <div style={{fontSize:13,color:'var(--muted)'}}>{form.email} · {form.phone}</div>
          <div style={{fontSize:13,color:'var(--muted)'}}>Site: <b>{form.siteName}</b></div>
        </div>
        {(s&&s.paystackKey)?(<>
          <Btn full onClick={launchPaystack} variant="green">Pay ₦2,000 with Card / Transfer</Btn>
          <div style={{fontSize:12,color:'var(--muted)',marginTop:8}}>Powered by Paystack — safe & instant</div>
        </>):(<>
          <div style={{background:'var(--blue)',borderRadius:14,padding:'16px',color:'#fff',marginBottom:12}}>
            <div style={{fontSize:11,opacity:.7,letterSpacing:1,textTransform:'uppercase',marginBottom:4}}>BANK TRANSFER</div>
            <div style={{fontSize:24,fontWeight:800,color:'var(--gold)',letterSpacing:2,marginBottom:4}}>{s.accountNumber}</div>
            <div style={{fontWeight:700}}>{s.accountName}</div>
            <div style={{fontSize:13,opacity:.8}}>{s.bankName}</div>
          </div>
          <div style={{fontSize:13,color:'var(--muted)',marginBottom:12}}>After transfer, forward your receipt to your referral agent.</div>
          <Btn full onClick={()=>setDone(true)}>I've made the payment</Btn>
        </>)}
      </div>
    </div>
  );

  if(done)return(
    <div style={{minHeight:'100vh',background:'var(--bg)',padding:20,display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div className="fade-up" style={{background:'#fff',borderRadius:20,padding:28,maxWidth:440,width:'100%',textAlign:'center',boxShadow:'var(--shadow)'}}>
        <div style={{fontSize:48,marginBottom:12}}>🎉</div>
        <div style={{fontWeight:800,fontSize:20,marginBottom:8,color:'var(--blue)'}}>Payment Received!</div>
        <div style={{color:'var(--muted)',fontSize:14,marginBottom:16}}>Your site will be built and ready within 48 hours. We'll notify you when it's live.</div>
        <Btn full onClick={()=>onNavigate('landing')} variant="outline">Back to Home</Btn>
      </div>
    </div>
  );
  return(
    <div style={{minHeight:'100vh',background:'var(--bg)',padding:'20px 16px'}}>
      <div style={{maxWidth:480,margin:'0 auto',background:'#fff',borderRadius:20,padding:24,boxShadow:'var(--shadow)'}}>
        <div style={{fontWeight:800,fontSize:20,color:'var(--blue)',marginBottom:4}}>🎓 Get Your VTU Site</div>
        <div style={{fontSize:13,color:'var(--muted)',marginBottom:16}}>One-time payment. 48-hour delivery.</div>
        {err&&<Alrt type="error" msg={err} onClose={()=>setErr('')}/>}
        <Inp label="Full Name" value={form.name} onChange={set('name')} required/>
        <Inp label="Phone Number" value={form.phone} onChange={set('phone')} type="tel" required/>
        <Inp label="Email Address" value={form.email} onChange={set('email')} type="email" required/>
        <Inp label="Preferred Site Name" value={form.siteName} onChange={set('siteName')} required/>
        <Inp label="Referral Code" value={form.ref} onChange={set('ref')} placeholder="e.g. AM001"/>
        <Btn full onClick={submit} style={{padding:'13px',marginTop:4}}>Submit Registration</Btn>
        <div style={{textAlign:'center',marginTop:12}}><button onClick={()=>onNavigate('landing')} style={{background:'none',border:'none',color:'var(--muted)',fontSize:13,cursor:'pointer'}}>← Back</button></div>
      </div>
    </div>
  );
}

// ── REFERRAL LINK INLINE (used on Home tab) ────────────────────────────────
function RefLinkInline({user}){
  const [copied,setCopied]=useState(false);
  const BASE='https://rehovtu.github.io';
  const link=`${BASE}/?ref=${user?.code}`;
  const copy=()=>{
    navigator.clipboard?.writeText(link).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2500);});
  };
  const share=()=>{
    if(navigator.share){
      navigator.share({title:'Join RehoVTU',text:`Join our team on RehoVTU using my link`,url:link}).catch(()=>{});
    } else copy();
  };
  const downRole=DOWNLINE[user?.role];
  return(
    <div>
      <div style={{background:'rgba(255,255,255,.08)',borderRadius:10,padding:'10px 12px',fontSize:12,wordBreak:'break-all',color:'rgba(255,255,255,.85)',marginBottom:8,fontFamily:'monospace',letterSpacing:.3}}>
        {link}
      </div>
      {downRole&&<div style={{fontSize:11,color:'rgba(255,255,255,.5)',marginBottom:8}}>
        👥 Anyone who opens this link will apply as <b style={{color:'var(--gold)'}}>{ROLE_LABELS[downRole]}</b> under you
      </div>}
      <div style={{display:'flex',gap:8}}>
        <button onClick={copy} style={{flex:1,padding:'9px',background:copied?'var(--green)':'rgba(255,255,255,.15)',border:'1px solid rgba(255,255,255,.25)',borderRadius:9,color:'#fff',fontWeight:700,fontSize:12,cursor:'pointer'}}>
          {copied?'✓ Copied!':'📋 Copy Link'}
        </button>
        <button onClick={share} style={{flex:1,padding:'9px',background:'var(--gold)',border:'none',borderRadius:9,color:'#fff',fontWeight:700,fontSize:12,cursor:'pointer'}}>
          📤 Share
        </button>
      </div>
    </div>
  );
}

// ── HOME TAB ───────────────────────────────────────────────────────────────
function HomeTab({user,users,signups,reports,settings,broadcasts}){
  const {start}=getMonthRange();
  const s=settings||DEFAULT_SETTINGS;

  // ── Count confirmed sign-ups only (founderApproved not false)
  const confirmedThisMonth=signups.filter(su=>su.date>=start&&su.founderApproved!==false);

  // ── AMBASSADOR ──
  const mySignups=confirmedThisMonth.filter(su=>su.ref===user.code);
  const myReports=reports.filter(r=>r.userCode===user.code&&r.date>=start);

  // ── CC: direct ambassadors under me, their confirmed sign-ups ──
  const myAmbassadors=Object.values(users).filter(u=>u.referredBy===user.code&&u.role==='ambassador'&&u.approved&&!u.resigned);
  const ccSignups=confirmedThisMonth.filter(su=>myAmbassadors.map(a=>a.code).includes(su.ref));

  // ── PM: CCs under me, and all ambassadors under those CCs ──
  const myCCs=Object.values(users).filter(u=>u.referredBy===user.code&&u.role==='cc'&&u.approved&&!u.resigned);
  const ccCodes=myCCs.map(c=>c.code);
  const ambsUnderPM=Object.values(users).filter(u=>ccCodes.includes(u.referredBy)&&u.role==='ambassador'&&u.approved&&!u.resigned);
  const pmSignups=confirmedThisMonth.filter(su=>ambsUnderPM.map(a=>a.code).includes(su.ref));

  // ── PFC: PMs under me → their CCs → their Ambassadors ──
  const myPMs=Object.values(users).filter(u=>u.referredBy===user.code&&u.role==='pm'&&u.approved&&!u.resigned);
  const pmCodes=myPMs.map(p=>p.code);
  const ccsUnderPFC=Object.values(users).filter(u=>pmCodes.includes(u.referredBy)&&u.role==='cc'&&u.approved&&!u.resigned);
  const ccCodesUnderPFC=ccsUnderPFC.map(c=>c.code);
  const ambsUnderPFC=Object.values(users).filter(u=>ccCodesUnderPFC.includes(u.referredBy)&&u.role==='ambassador'&&u.approved&&!u.resigned);
  const pfcSignups=confirmedThisMonth.filter(su=>ambsUnderPFC.map(a=>a.code).includes(su.ref));

  const needConfirm=user.role==='pfc'?signups.filter(su=>su.pfcStatus==='Pending').length:0;

  // Deductions & bonuses
  const totalDed=(user.deductions||[]).reduce((a,d)=>a+(d.amount||0),0);
  const totalBon=(user.bonuses||[]).reduce((a,b)=>a+(b.amount||0),0);

  // Ambassador earnings
  const amEarnings=()=>{
    const n=mySignups.length;
    return(Math.min(n,50)*500)+(Math.max(0,n-50)*700);
  };

  const tips={
    ambassador:['Follow up with every student within 24 hours','Share your link on WhatsApp and Instagram daily','Track your sign-ups every morning','Always collect referral payments immediately'],

function DeadlineCard({role}){
  const [rem,setRem]=useState('');const [past,setPast]=useState(false);
  useEffect(()=>{
    const dl=DEADLINES[role];if(!dl)return;
    const tick=()=>{
      const now=new Date();const[h,m]=dl.split(':').map(Number);
      const t=new Date(now);t.setHours(h,m,0,0);
      const diff=t-now;
      if(diff<=0){setPast(true);setRem('Deadline passed');}
      else{setPast(false);const hh=Math.floor(diff/3600000);const mm=Math.floor((diff%3600000)/60000);const ss=Math.floor((diff%60000)/1000);setRem(`${hh}h ${mm}m ${ss}s`);}
    };tick();const i=setInterval(tick,1000);return()=>clearInterval(i);
  },[role]);
  if(!role||role==='founder')return null;
  const ded=DEDUCTIONS[role]?.daily||0;
  return(
    <div style={{background:past?'#fee2e2':'#f0f4ff',borderRadius:14,padding:'12px 16px',border:`1.5px solid ${past?'#fca5a5':'#c0ccf0'}`}}>
      <div style={{fontSize:11,color:past?'#dc2626':'var(--blue)',fontWeight:600,marginBottom:4}}>📅 TODAY'S REPORT DEADLINE</div>
      <div style={{fontWeight:800,fontSize:20,color:past?'#dc2626':'var(--blue)'}}>{rem}</div>
      <div style={{fontSize:12,color:'var(--muted)',marginTop:2}}>Deadline: {DEADLINES[role]} · Miss = -{fmt(ded)}</div>
    </div>
  );
}

                      <div><span style={{fontSize:11,background:'#e2e8f0',color:'#475569',padding:'2px 8px',borderRadius:99,fontWeight:700}}>Used</span>{reg&&<span style={{fontSize:12,fontWeight:600,marginLeft:8}}>{reg.name}</span>}</div>
                      <span style={{fontSize:11,color:'var(--muted)'}}>{v.usedAt?fmtDate(v.usedAt):''}</span>

        </>

    </div>
  );
}


function InviteTab({user,users,inviteTokens,saveInviteTokens}){
  const [copied,setCopied]=useState('');
  const [ok,setOk]=useState('');
  const downRole=DOWNLINE[user.role];
  const myCode=user.code||user.id;
  const baseUrl=window.location.origin+window.location.pathname;
  const myTokens=Object.entries(inviteTokens||{}).filter(([,v])=>v.inviterCode===myCode).sort((a,b)=>b[1].createdAt>a[1].createdAt?1:-1);
  const genToken=async()=>{
    if(!downRole)return;
    const id='inv_'+myCode+'_'+Date.now();
    const data={role:downRole,inviterCode:myCode,inviterName:user.name,inviterRole:user.role,createdAt:new Date().toISOString(),used:false,usedBy:null};
    await saveInviteTokens({...(inviteTokens||{}),[id]:data});
    const url=`${baseUrl}?invite=${encodeURIComponent(id)}#team`;
    navigator.clipboard.writeText(url).then(()=>{setCopied(id);setTimeout(()=>setCopied(''),3000);});
    setOk('Link generated & copied!');setTimeout(()=>setOk(''),3000);
  };
  const copyToken=id=>{
    const url=`${baseUrl}?invite=${encodeURIComponent(id)}#team`;
    navigator.clipboard.writeText(url).then(()=>{setCopied(id);setTimeout(()=>setCopied(''),2500);});
  };
  const revokeToken=async id=>{
    if(!confirm('Revoke this link?'))return;
    const u={...(inviteTokens||{})};delete u[id];
    await saveInviteTokens(u);
  };
  const active=myTokens.filter(([,v])=>!v.used);
  const used=myTokens.filter(([,v])=>v.used);
  return(
    <div>
      {ok&&<Alrt type="success" msg={ok}/>}
      <div style={{background:'linear-gradient(135deg,#1A3A8F,#2563eb)',borderRadius:16,padding:'18px 20px',marginBottom:14,color:'#fff'}}>
        <div style={{fontSize:12,opacity:.7,letterSpacing:1,marginBottom:4}}>YOUR INVITE SYSTEM</div>
        <div style={{fontWeight:800,fontSize:17,marginBottom:4}}>Generate Invite Links</div>
        <div style={{fontSize:13,opacity:.85,lineHeight:1.5}}>Each link is <b>single-use</b>. Recruit auto-links under you.</div>
      </div>
      {!downRole?(
        <div style={{background:'#fff',borderRadius:14,padding:20,textAlign:'center',boxShadow:'var(--shadow)'}}>
          <div style={{fontSize:32,marginBottom:8}}>🔒</div>
          <div style={{fontSize:14,color:'var(--muted)'}}>Ambassadors cannot invite downline members.</div>
        </div>
      ):(
        <>
          <div style={{background:'#fff',borderRadius:14,padding:'16px',boxShadow:'var(--shadow)',marginBottom:14}}>
            <div style={{fontSize:13,marginBottom:12}}>You can invite <b style={{color:ROLE_COLORS[downRole]}}>{ROLE_LABELS[downRole]}s</b> — linked directly under you.</div>
            <Btn full onClick={genToken} variant="green">➕ Generate New Invite Link</Btn>
            <div style={{fontSize:11,color:'var(--muted)',textAlign:'center',marginTop:6}}>Single-use · expires after one registration</div>
          </div>
          {active.length>0&&(
            <div style={{marginBottom:14}}>
              <div style={{fontSize:12,fontWeight:700,color:'var(--muted)',letterSpacing:.5,marginBottom:8}}>ACTIVE ({active.length})</div>
              {active.map(([id,v])=>(
                <div key={id} style={{background:'#fff',borderRadius:12,padding:'12px 14px',marginBottom:6,boxShadow:'var(--shadow)',border:'1px solid #bbf7d0'}}>
                  <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:6}}>
                    <div><span style={{fontSize:11,background:ROLE_BG[v.role],color:ROLE_COLORS[v.role],padding:'2px 8px',borderRadius:99,fontWeight:700}}>{ROLE_LABELS[v.role]}</span><span style={{fontSize:11,color:'var(--muted)',marginLeft:8}}>{fmtDate(v.createdAt)}</span></div>
                    <div style={{display:'flex',gap:6}}>
                      <Btn small onClick={()=>copyToken(id)} variant={copied===id?'green':'primary'}>{copied===id?'✓':'Copy'}</Btn>
                      <button onClick={()=>revokeToken(id)} style={{background:'#fee2e2',border:'none',borderRadius:8,color:'#dc2626',padding:'6px 10px',fontSize:11,cursor:'pointer',fontWeight:600}}>Revoke</button>
                    </div>
                  </div>
                  <div style={{fontSize:11,color:'var(--muted)',wordBreak:'break-all',background:'#f8f9ff',borderRadius:6,padding:'4px 8px'}}>{baseUrl}?invite={id.slice(0,20)}...</div>
                </div>
              ))}
            </div>
          )}
          {used.length>0&&(
            <div>
              <div style={{fontSize:12,fontWeight:700,color:'var(--muted)',letterSpacing:.5,marginBottom:8}}>USED ({used.length})</div>
              {used.map(([id,v])=>{
                const reg=Object.values(users).find(u=>(u.code||u.id)===v.usedBy);
                return(
                  <div key={id} style={{background:'#f8f9ff',borderRadius:12,padding:'10px 14px',marginBottom:6}}>
                    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                      <div><span style={{fontSize:11,background:'#e2e8f0',color:'#475569',padding:'2px 8px',borderRadius:99,fontWeight:700}}>Used</span>{reg&&<span style={{fontSize:12,fontWeight:600,marginLeft:8}}>{reg.name}</span>}</div>
                      <span style={{fontSize:11,color:'var(--muted)'}}>{v.usedAt?fmtDate(v.usedAt):''}</span>
                    </div>
                  </div>
                );
              })}
            </div>
          )}
          {myTokens.length===0&&<div style={{textAlign:'center',color:'var(--muted)',padding:24,fontSize:13}}>No invite links yet. Generate one above.</div>}
        </>
      )}
    </div>
  );

function MeetingTab({user,users,saveUsers}){
  const [view,setView]=useState('home'); // home | create | schedule | join | live
  const [activeRoom,setActiveRoom]=useState(null);
  const [meetings,setMeetings]=useState(()=>{
    try{return JSON.parse(localStorage.getItem('rv_meetings')||'[]');}catch{return[];}
  });
  const [form,setForm]=useState({title:'',date:'',time:'',role:'all',notes:''});

  const saveMeetings=m=>{setMeetings(m);localStorage.setItem('rv_meetings',JSON.stringify(m));};

  // Role rooms (instant join)
  const roleRooms={
    founder:['rehovtu-all','rehovtu-pfc','rehovtu-pm','rehovtu-cc','rehovtu-ambassador'],
    pfc:['rehovtu-pfc','rehovtu-all'],
    pm:['rehovtu-pm','rehovtu-all'],
    cc:['rehovtu-cc','rehovtu-all'],
    ambassador:['rehovtu-ambassador','rehovtu-all'],
  };
  const roomLabels={
    'rehovtu-all':'🌐 All Hands',
    'rehovtu-pfc':'🔵 PFC Room',
    'rehovtu-pm':'🟣 PM Room',
    'rehovtu-cc':'🟠 CC Room',
    'rehovtu-ambassador':'🟢 Ambassador Room',
  };
  const myRooms=roleRooms[user.role]||['rehovtu-all'];

  const createMeeting=()=>{
    if(!form.title.trim()){alert('Enter a meeting title');return;}
    const roomId='rehovtu-'+Date.now();
    const m={
      id:'mtg_'+Date.now(),
      title:form.title,
      roomId,
      date:form.date||TODAY,
      time:form.time||'',
      role:form.role,
      notes:form.notes,
      createdBy:user.code,
      createdByName:user.name,
      scheduled:!!(form.date&&form.time),
      createdAt:new Date().toISOString(),
    };
    saveMeetings([m,...meetings]);
    setForm({title:'',date:'',time:'',role:'all',notes:''});
    setView('home');
    alert(`✅ Meeting created!\n\nTitle: ${m.title}\nRoom: ${roomId}\n\nShare this with your team or they can see it in their Meet tab.`);
  };

  const joinMeeting=(roomId,title)=>{
    setActiveRoom({roomId,title});
    setView('live');
  };

  const leaveMeeting=()=>{
    setActiveRoom(null);
    setView('home');
  };

  const deleteMeeting=id=>saveMeetings(meetings.filter(m=>m.id!==id));

  // Filter meetings visible to this user
  const visibleMeetings=meetings.filter(m=>
    m.role==='all'||m.role===user.role||user.role==='founder'
  );
  const upcoming=visibleMeetings.filter(m=>m.scheduled&&(m.date>TODAY||(m.date===TODAY)));
  const instant=visibleMeetings.filter(m=>!m.scheduled);

  // ── LIVE CALL VIEW ──
  if(view==='live'&&activeRoom){
    const url=`https://${JITSI_DOMAIN}/${activeRoom.roomId}#userInfo.displayName="${encodeURIComponent(user.name)}"&config.prejoinPageEnabled=false&config.startWithAudioMuted=false&config.startWithVideoMuted=false`;
    // Open in new tab to avoid 5-min Jitsi embed limit
    useEffect(()=>{
      window.open(url,'_blank','noopener,noreferrer');
    },[]);
    return(
      <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:32,gap:20,minHeight:300}}>
        <div style={{fontSize:56}}>📹</div>
        <div style={{fontWeight:800,fontSize:18,textAlign:'center'}}>{activeRoom.title}</div>
        <div style={{background:'#dcfce7',borderRadius:12,padding:'14px 18px',textAlign:'center',border:'1px solid #bbf7d0'}}>
          <div style={{fontSize:13,fontWeight:700,color:'#166534',marginBottom:4}}>✅ Call opened in a new tab</div>
          <div style={{fontSize:12,color:'#15803d'}}>Your meeting is running in a separate browser tab. Come back here when you're done.</div>
        </div>
        <Btn onClick={()=>window.open(url,'_blank','noopener,noreferrer')} full variant="green">
          🔗 Reopen Call Tab
        </Btn>
        <Btn onClick={leaveMeeting} full variant="outline">
          ← Back to Meetings
        </Btn>
        <div style={{fontSize:12,color:'var(--muted)',textAlign:'center',maxWidth:280}}>
          Room ID: <b>{activeRoom.roomId}</b><br/>Share this with anyone who needs to join
        </div>
      </div>
    );
  }

  // ── CREATE MEETING VIEW ──
  if(view==='create'||view==='schedule'){
    const isScheduled=view==='schedule';
    return(
      <div style={{paddingBottom:16}}>
        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:16}}>
          <button onClick={()=>setView('home')} style={{background:'none',border:'none',color:'var(--blue)',fontWeight:700,fontSize:14,cursor:'pointer'}}>← Back</button>
          <div style={{fontWeight:700,fontSize:16}}>{isScheduled?'📅 Schedule Meeting':'⚡ Create Instant Meeting'}</div>
        </div>
        <div style={{background:'#fff',borderRadius:14,padding:'16px',boxShadow:'var(--shadow)'}}>
          <Inp label="Meeting Title" value={form.title} onChange={e=>setForm(f=>({...f,title:e.target.value}))} placeholder="e.g. Weekly CC Review" required/>
          {isScheduled&&<>
            <Inp label="Date" type="date" value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))} required/>
            <Inp label="Time" type="time" value={form.time} onChange={e=>setForm(f=>({...f,time:e.target.value}))} required/>
          </>}
          <Sel label="Who can join" value={form.role} onChange={e=>setForm(f=>({...f,role:e.target.value,targetCode:''}))}
            options={[{v:'all',l:'Everyone'},{v:'pfc',l:'PFCs only'},{v:'pm',l:'PMs only'},{v:'cc',l:'CCs only'},{v:'ambassador',l:'Ambassadors only'},{v:'1on1',l:'1-on-1 with a member'}]}/>
          {form.role==='1on1'&&users&&(()=>{
            const downRole=DOWNLINE[user.role];
            const myDownline=Object.values(users).filter(u=>u.approved&&!u.resigned&&(u.referredBy===user.code||(downRole&&u.role===downRole)));
            return <Sel label="Select Member" value={form.targetCode||''} onChange={e=>setForm(f=>({...f,targetCode:e.target.value}))}
              options={[{v:'',l:'-- Select member --'},...myDownline.map(m=>({v:m.code||m.id,l:`${m.name} (${ROLE_LABELS[m.role]})`}))]}/>;
          })()}
          <Inp label="Notes (optional)" value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))} placeholder="Agenda or notes..." rows={3}/>
          <Btn full onClick={createMeeting} variant={isScheduled?'primary':'green'}>
            {isScheduled?'📅 Schedule Meeting':'⚡ Start Now'}
          </Btn>
        </div>
      </div>
    );
  }

  // ── JOIN MEETING VIEW ──
  if(view==='join'){
    const [code,setCode]=useState('');
    return(
      <div style={{paddingBottom:16}}>
        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:16}}>
          <button onClick={()=>setView('home')} style={{background:'none',border:'none',color:'var(--blue)',fontWeight:700,fontSize:14,cursor:'pointer'}}>← Back</button>
          <div style={{fontWeight:700,fontSize:16}}>🔗 Join with Code</div>
        </div>
        <div style={{background:'#fff',borderRadius:14,padding:'16px',boxShadow:'var(--shadow)'}}>
          <Inp label="Room Code or Meeting ID" value={code} onChange={e=>setCode(e.target.value)} placeholder="e.g. rehovtu-1234567890"/>
          <div style={{fontSize:12,color:'var(--muted)',marginBottom:14}}>Ask the meeting creator for the room code, or they can share the full link.</div>
          <Btn full onClick={()=>{if(code.trim())joinMeeting(code.trim(),'Meeting');}} variant="primary">Join Meeting →</Btn>
        </div>
      </div>
    );
  }

  // ── HOME VIEW ──
  return(
    <div style={{paddingBottom:16}}>
      {/* Action buttons */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:16}}>
        <button onClick={()=>setView('create')}
          style={{background:'var(--green)',border:'none',borderRadius:12,color:'#fff',padding:'12px 6px',cursor:'pointer',fontWeight:700,fontSize:12,display:'flex',flexDirection:'column',alignItems:'center',gap:4}}>
          <span style={{fontSize:22}}>⚡</span>New Meeting
        </button>
        <button onClick={()=>setView('schedule')}
          style={{background:'var(--blue)',border:'none',borderRadius:12,color:'#fff',padding:'12px 6px',cursor:'pointer',fontWeight:700,fontSize:12,display:'flex',flexDirection:'column',alignItems:'center',gap:4}}>
          <span style={{fontSize:22}}>📅</span>Schedule
        </button>
        <button onClick={()=>setView('join')}
          style={{background:'var(--dark)',border:'none',borderRadius:12,color:'#fff',padding:'12px 6px',cursor:'pointer',fontWeight:700,fontSize:12,display:'flex',flexDirection:'column',alignItems:'center',gap:4}}>
          <span style={{fontSize:22}}>🔗</span>Join
        </button>
      </div>

      {/* Instant role rooms */}
      <div style={{fontWeight:700,fontSize:14,marginBottom:8}}>🏠 Your Rooms</div>
      {myRooms.map(room=>(
        <div key={room} style={{background:'#fff',borderRadius:12,padding:'12px 14px',marginBottom:8,boxShadow:'var(--shadow)',display:'flex',alignItems:'center',gap:10}}>
          <div style={{fontSize:24,flexShrink:0}}>{room.includes('all')?'🌐':room.includes('pfc')?'🔵':room.includes('pm')?'🟣':room.includes('cc')?'🟠':'🟢'}</div>
          <div style={{flex:1}}>
            <div style={{fontWeight:600,fontSize:14}}>{roomLabels[room]}</div>
            <div style={{fontSize:11,color:'var(--muted)'}}>Permanent room · Always available</div>
          </div>
          <Btn small onClick={()=>joinMeeting(room,roomLabels[room])} variant="primary">Join</Btn>
        </div>
      ))}

      {/* Scheduled meetings */}
      {upcoming.length>0&&<>
        <div style={{fontWeight:700,fontSize:14,margin:'14px 0 8px'}}>📅 Scheduled Meetings</div>
        {upcoming.map(m=>(
          <div key={m.id} style={{background:'#fff',borderRadius:12,padding:'12px 14px',marginBottom:8,boxShadow:'var(--shadow)'}}>
            <div style={{display:'flex',alignItems:'flex-start',gap:8}}>
              <div style={{flex:1}}>
                <div style={{fontWeight:700,fontSize:14}}>{m.title}</div>
                <div style={{fontSize:12,color:'var(--blue)',marginTop:2}}>📅 {fmtDate(m.date)} {m.time&&`at ${m.time}`}</div>
                <div style={{fontSize:11,color:'var(--muted)'}}>By {m.createdByName} · {m.role==='all'?'Everyone':ROLE_LABELS[m.role]}</div>
                {m.notes&&<div style={{fontSize:12,color:'var(--muted)',marginTop:4,fontStyle:'italic'}}>{m.notes}</div>}
              </div>
              {(user.role==='founder'||m.createdBy===user.code)&&
                <button onClick={()=>deleteMeeting(m.id)} style={{background:'none',border:'none',color:'#dc2626',fontSize:18,cursor:'pointer'}}>✕</button>}
            </div>
            <div style={{display:'flex',gap:8,marginTop:10}}>
              <Btn full small onClick={()=>joinMeeting(m.roomId,m.title)} variant="primary">📹 Join Meeting</Btn>
              <button onClick={()=>{
                const link=`https://${JITSI_DOMAIN}/${m.roomId}`;
                navigator.clipboard?.writeText(link).then(()=>alert('Link copied!\n\n'+link));
              }} style={{padding:'7px 12px',borderRadius:8,border:'1.5px solid var(--border)',background:'#fff',fontSize:12,fontWeight:600,cursor:'pointer',color:'var(--blue)'}}>
                🔗 Copy Link
              </button>
            </div>
          </div>
        ))}
      </>}

      {/* Instant/past meetings */}
      {instant.length>0&&<>
        <div style={{fontWeight:700,fontSize:14,margin:'14px 0 8px'}}>⚡ Recent Meetings</div>
        {instant.slice(0,5).map(m=>(
          <div key={m.id} style={{background:'#fff',borderRadius:12,padding:'12px 14px',marginBottom:8,boxShadow:'var(--shadow)'}}>
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <div style={{flex:1}}>
                <div style={{fontWeight:600,fontSize:14}}>{m.title}</div>
                <div style={{fontSize:11,color:'var(--muted)'}}>By {m.createdByName} · {fmtDate(m.createdAt)}</div>
              </div>
              {(user.role==='founder'||m.createdBy===user.code)&&
                <button onClick={()=>deleteMeeting(m.id)} style={{background:'none',border:'none',color:'#dc2626',fontSize:18,cursor:'pointer'}}>✕</button>}
            </div>
            <div style={{display:'flex',gap:8,marginTop:8}}>
              <Btn full small onClick={()=>joinMeeting(m.roomId,m.title)} variant="ghost">📹 Rejoin</Btn>
              <button onClick={()=>{
                const link=`https://${JITSI_DOMAIN}/${m.roomId}`;
                navigator.clipboard?.writeText(link).then(()=>alert('Link copied!\n\n'+link));
              }} style={{padding:'7px 12px',borderRadius:8,border:'1.5px solid var(--border)',background:'#fff',fontSize:12,fontWeight:600,cursor:'pointer',color:'var(--blue)'}}>
                🔗 Copy Link
              </button>
            </div>
          </div>
        ))}
      </>}

      {/* Tips */}
      <div style={{background:'#f0f4ff',borderRadius:12,padding:'12px 14px',marginTop:8}}>
        <div style={{fontWeight:700,fontSize:12,color:'var(--blue)',marginBottom:6}}>💡 Tips</div>
        <div style={{fontSize:12,color:'var(--muted)',lineHeight:1.8}}>
          • <b>New Meeting</b> — starts immediately, share room code with team<br/>
          • <b>Schedule</b> — plan ahead, shows up in everyone's Meet tab<br/>
          • <b>Join</b> — enter a room code someone shared with you<br/>
          • To record: use your phone's built-in <b>Screen Recorder</b> 📱
        </div>
      </div>
    </div>
  );
}

function GrpChatRoom({user,users,messages,onSend,onBack,groupName,groupIcon}){
  const [msg,setMsg]=useState('');
  const endRef=useRef();
  useEffect(()=>{endRef.current?.scrollIntoView({behavior:'smooth'});},[messages]);
  const send=async()=>{
    if(!msg.trim())return;
    const text=msg.trim();setMsg('');
    await onSend(text);
  };
  return(
    <div style={{display:'flex',flexDirection:'column',height:'calc(100vh - 220px)',minHeight:300}}>
      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:10,paddingBottom:10,borderBottom:'1px solid var(--border)'}}>
        <button onClick={onBack} style={{background:'none',border:'none',fontSize:18,cursor:'pointer',color:'var(--blue)',padding:0}}>←</button>
        <div style={{fontSize:22}}>{groupIcon||'💬'}</div>
        <div style={{fontWeight:700,fontSize:15}}>{groupName}</div>
      </div>
      <div style={{flex:1,overflowY:'auto',display:'flex',flexDirection:'column',gap:8,paddingBottom:8}} className="hide-scroll">
        {messages.length===0&&<div style={{textAlign:'center',color:'var(--muted)',marginTop:40,fontSize:14}}>No messages yet. Say hi! 👋</div>}
        {messages.map(m=>{
          const isMe=m.userCode===user.code;
          return(
            <div key={m.id} style={{display:'flex',gap:8,flexDirection:isMe?'row-reverse':'row',alignItems:'flex-end'}}>

function GrpTab({user,grp,saveGrp,users}){
  // grp is now an object: {main:[...msgs], custom:{groupId:{name,icon,members,msgs,createdBy},...}}

  const [createForm,setCreateForm]=useState({name:'',icon:'💬'});

  const allMembers=Object.values(users).filter(u=>u.approved&&u.code!==user.code);

  const saveMain=async msgs=>{
    const ng={...normalised,main:msgs};
    await saveGrp(ng);
  };
  const saveCustom=async custom=>{
    const ng={...normalised,custom};
    await saveGrp(ng);
  };

  const createGroup=async()=>{
    if(!createForm.name.trim()){alert('Enter a group name');return;}
    if(selectedMembers.length===0){alert('Add at least one member');return;}
    const id='grp_'+Date.now();
    const newGroup={
      id,name:createForm.name.trim(),icon:createForm.icon||'💬',
      members:[user.code,...selectedMembers],
      msgs:[],createdBy:user.code,createdAt:new Date().toISOString()
    };
    const updated={...normalised.custom,[id]:newGroup};
    await saveCustom(updated);
    setShowCreate(false);setCreateForm({name:'',icon:'💬'});setSelectedMembers([]);
    setActiveGroup(id);setView('room');
  };

  const sendToMain=async text=>{
    const m={id:'g_'+Date.now(),userCode:user.code,userName:user.name,userRole:user.role,text,time:new Date().toISOString()};
    await saveMain([...normalised.main,m]);
  };

  const sendToGroup=async(gid,text)=>{
    const g=normalised.custom[gid];if(!g)return;
    const m={id:'g_'+Date.now(),userCode:user.code,userName:user.name,userRole:user.role,text,time:new Date().toISOString()};
    const updated={...normalised.custom,[gid]:{...g,msgs:[...(g.msgs||[]),m]}};
    await saveCustom(updated);
  };

  const myGroups=Object.values(normalised.custom).filter(g=>(g.members||[]).includes(user.code));

              <div key={m.code} onClick={()=>setSelectedMembers(prev=>sel?prev.filter(x=>x!==m.code):[...prev,m.code])}

        return(
          <div key={g.id} onClick={()=>{localStorage.setItem('grp_seen_'+g.id,Date.now().toString());setActiveGroup(g.id);setView('room');}}

            <div style={{fontSize:28,width:44,height:44,borderRadius:99,background:'#f1f5f9',display:'flex',alignItems:'center',justifyContent:'center'}}>{g.icon}</div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontWeight:700,fontSize:14}}>{g.name}</div>
              <div style={{fontSize:12,color:'var(--muted)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{lastMsg(g.msgs)}</div>
            </div>

              {badge>0&&<div style={{background:'var(--blue)',color:'#fff',borderRadius:99,width:18,height:18,fontSize:11,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700}}>{badge}</div>}
            </div>

      })}
      {myGroups.length===0&&<div style={{textAlign:'center',color:'var(--muted)',marginTop:20,fontSize:13}}>No custom groups yet. Create one for your team!</div>}
    </div>
  );
}

// ── REPORT HELPERS ─────────────────────────────────────────────────────────
function getMonthKey(dateStr){
  const d=new Date(dateStr);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
}
function getMonthLabel(key){
  const [y,m]=key.split('-');
  return new Date(y,parseInt(m)-1,1).toLocaleDateString('en-NG',{month:'long',year:'numeric'});
}
function getDaysInMonth(year,month){
  return new Date(year,month,0).getDate();
}
function getMissedDays(reports,userCode,year,month){
  const daysInMonth=getDaysInMonth(year,month);
  const today=new Date();
  const isCurrentMonth=today.getFullYear()===year&&today.getMonth()+1===month;
  const lastDay=isCurrentMonth?today.getDate():daysInMonth;
  const submitted=new Set(
    reports.filter(r=>r.userCode===userCode&&r.type==='daily'&&
      new Date(r.date).getFullYear()===year&&new Date(r.date).getMonth()+1===month
    ).map(r=>new Date(r.date).getDate())
  );
  const missed=[];
  for(let d=1;d<=lastDay;d++){
    const date=new Date(year,month-1,d);
    if(date.getDay()!==0&&!submitted.has(d))missed.push(d); // skip Sundays
  }
  return missed;
}
function getUplineRole(role){
  const map={ambassador:'cc',cc:'pm',pm:'pfc',pfc:'founder'};
  return map[role];
}

// ── REPORTS TAB (member view — submit + my filed reports) ──────────────────
function ReportsTab({user,users,reports,saveReports,pushNotif}){
  const [type,setType]=useState('daily');
  const [text,setText]=useState('');
  const [err,setErr]=useState('');
  const [ok,setOk]=useState('');
  const [openMonth,setOpenMonth]=useState(null);
  const [replyTarget,setReplyTarget]=useState(null);
  const [replyText,setReplyText]=useState('');

  const mine=reports.filter(r=>r.userCode===user.code);

  // Group by month
  const byMonth={};
  mine.forEach(r=>{
    const k=getMonthKey(r.date);
    if(!byMonth[k])byMonth[k]=[];
    byMonth[k].push(r);
  });
  const months=Object.keys(byMonth).sort((a,b)=>b>a?1:-1);

  const submit=async()=>{
    if(!text.trim()){setErr('Write your report');return;}
    // Find upline to notify
    const uplineRole=getUplineRole(user.role);
    const upline=uplineRole==='founder'
      ?Object.values(users).find(u=>u.role==='founder')
      :Object.values(users).find(u=>u.role===uplineRole&&u.referredBy===undefined||
        Object.values(users).find(u2=>u2.code===user.referredBy));
    // Simpler: notify whoever user reports to
    const supervisor=Object.values(users).find(u2=>u2.code===user.referredBy)||
      Object.values(users).find(u2=>u2.role==='founder');

    const r={
      id:'rpt_'+Date.now(),
      userCode:user.code,userName:user.name,userRole:user.role,
      supervisorCode:supervisor?.code||'FOUNDER',
      type,text:text.trim(),
      date:TODAY,time:new Date().toISOString(),replies:[]
    };
    await saveReports([...reports,r]);
    if(supervisor){
      await pushNotif(supervisor.code||'FOUNDER',`📋 New ${type} report from ${user.name} (${user.code})`);
    }
    setText('');setOk('Report submitted!');setErr('');
    setTimeout(()=>setOk(''),3000);
  };

  const submitReply=async(reportId)=>{
    if(!replyText.trim())return;
    const newReports=reports.map(r=>{
      if(r.id!==reportId)return r;
      const rep={by:user.name,byCode:user.code,text:replyText.trim(),time:new Date().toISOString()};
      return{...r,replies:[...(r.replies||[]),rep]};
    });
    await saveReports(newReports);
    // Notify report owner
    const rpt=reports.find(r=>r.id===reportId);
    if(rpt)await pushNotif(rpt.userCode,`💬 ${user.name} replied to your report`);
    setReplyText('');setReplyTarget(null);
  };

  const typeColor={daily:'#dbeafe',weekly:'#f3e5f5',monthly:'#e8f5e9'};
  const typeText={daily:'var(--blue)',weekly:'var(--purple)',monthly:'var(--green)'};

  return(
    <div style={{display:'flex',flexDirection:'column',gap:12,paddingBottom:16}}>
      {/* Submit form */}
      <div style={{background:'#fff',borderRadius:14,padding:'14px',boxShadow:'var(--shadow)'}}>
        <div style={{fontWeight:700,marginBottom:10}}>Submit Report</div>
        <div style={{display:'flex',gap:6,marginBottom:10}}>
          {['daily','weekly','monthly'].map(t=>(
            <button key={t} onClick={()=>setType(t)}
              style={{padding:'6px 14px',borderRadius:99,border:`1.5px solid ${type===t?'var(--blue)':'var(--border)'}`,
                background:type===t?'var(--blue)':'transparent',color:type===t?'#fff':'var(--muted)',
                fontSize:12,fontWeight:600,cursor:'pointer'}}>
              {t.charAt(0).toUpperCase()+t.slice(1)}
            </button>
          ))}
        </div>
        {err&&<Alrt type="error" msg={err}/>}
        {ok&&<Alrt type="success" msg={ok}/>}
        <textarea value={text} onChange={e=>setText(e.target.value)}
          placeholder="Write your report here..." rows={4}
          style={{width:'100%',padding:'11px 13px',border:'1.5px solid var(--border)',borderRadius:10,
            fontSize:13,outline:'none',background:'#fafbff',resize:'vertical',marginBottom:10}}/>
        <Btn onClick={submit} full>Submit Report</Btn>
      </div>

      {/* Filed reports — by month */}
      <div style={{fontWeight:700,fontSize:14,marginBottom:2}}>
        My Report Files ({mine.length} total)
      </div>

      {months.length===0&&<div style={{textAlign:'center',color:'var(--muted)',marginTop:20}}>No reports yet.</div>}

      {months.map(mk=>{
        const [y,m]=mk.split('-').map(Number);
        const monthReports=[...byMonth[mk]].sort((a,b)=>b.date>a.date?1:-1);
        const missed=getMissedDays(reports,user.code,y,m);
        const isOpen=openMonth===mk;
        return(
          <div key={mk} style={{background:'#fff',borderRadius:14,boxShadow:'var(--shadow)',overflow:'hidden'}}>
            {/* Month header — tap to open/close */}
            <div onClick={()=>setOpenMonth(isOpen?null:mk)}
              style={{display:'flex',alignItems:'center',justifyContent:'space-between',
                padding:'12px 14px',cursor:'pointer',background:isOpen?'var(--blue)':'#fff',
                transition:'background .2s'}}>
              <div style={{display:'flex',alignItems:'center',gap:10}}>
                <span style={{fontSize:20}}>📁</span>
                <div>
                  <div style={{fontWeight:700,fontSize:14,color:isOpen?'#fff':'var(--text)'}}>{getMonthLabel(mk)}</div>
                  <div style={{fontSize:11,color:isOpen?'rgba(255,255,255,.7)':'var(--muted)'}}>
                    {monthReports.length} report{monthReports.length!==1?'s':''}
                    {missed.length>0&&<span style={{color:isOpen?'#fca5a5':'#dc2626',fontWeight:700}}> · {missed.length} missed</span>}
                  </div>
                </div>
              </div>
              <span style={{color:isOpen?'#fff':'var(--muted)',fontSize:18}}>{isOpen?'▾':'▸'}</span>
            </div>

            {isOpen&&(
              <div style={{padding:'10px 14px'}}>
                {/* Missed days warning */}
                {missed.length>0&&(

}

// ── TEAM REPORTS TAB (upline view — see downline filed reports) ─────────────
function TeamReportsTab({user,users,reports,saveReports,pushNotif}){
  const [selectedMember,setSelectedMember]=useState(null);
  const [openMonth,setOpenMonth]=useState(null);
  const [replyTarget,setReplyTarget]=useState(null);
  const [replyText,setReplyText]=useState('');

  // Get direct reports (people who report to this user)
  const directReports=Object.values(users).filter(u=>u.referredBy===user.code&&u.approved&&!u.resigned);
  // Founder sees everyone
  const reportingTo=user.role==='founder'
    ?Object.values(users).filter(u=>u.approved&&u.id!=='FOUNDER'&&!u.resigned)
    :directReports;

  const getMemberReports=(code)=>reports.filter(r=>r.userCode===code);

  const submitReply=async(reportId)=>{
    if(!replyText.trim())return;
    const newReports=reports.map(r=>{
      if(r.id!==reportId)return r;
      return{...r,replies:[...(r.replies||[]),{by:user.name,byCode:user.code,text:replyText.trim(),time:new Date().toISOString()}]};
    });
    await saveReports(newReports);
    const rpt=reports.find(r=>r.id===reportId);
    if(rpt){
      await pushNotif(rpt.userCode,`💬 ${user.name} replied to your report`);
      const owner=Object.values(users).find(u=>u.code===rpt.userCode);
      if(owner){
        const{subject:rSubj,html:rHtml}=EMAILS.reportReply(owner.name,user.name,rpt.text,replyText.trim());
        await sendEmail(owner.email,owner.name,rSubj,rHtml);
      }
    }
    setReplyText('');setReplyTarget(null);
  };

  const typeColor={daily:'#dbeafe',weekly:'#f3e5f5',monthly:'#e8f5e9'};
  const typeText={daily:'var(--blue)',weekly:'var(--purple)',monthly:'var(--green)'};

  if(selectedMember){
    const memReports=getMemberReports(selectedMember.code);
    const byMonth={};
    memReports.forEach(r=>{const k=getMonthKey(r.date);if(!byMonth[k])byMonth[k]=[];byMonth[k].push(r);});
    const months=Object.keys(byMonth).sort((a,b)=>b>a?1:-1);
    const totalMissed=months.reduce((acc,mk)=>{
      const [y,m]=mk.split('-').map(Number);
      return acc+getMissedDays(reports,selectedMember.code,y,m).length;
    },0);

    return(
      <div style={{paddingBottom:16}}>
        {/* Back button */}
        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12}}>
          <button onClick={()=>setSelectedMember(null)}
            style={{background:'none',border:'none',color:'var(--blue)',fontWeight:700,fontSize:14,cursor:'pointer'}}>
            ← Back
          </button>
          <Ava user={selectedMember} size={28}/>
          <div>
            <div style={{fontWeight:700,fontSize:14}}>{selectedMember.name}</div>
            <div style={{fontSize:11,color:'var(--muted)'}}>{selectedMember.code} · {memReports.length} reports · {totalMissed} missed</div>
          </div>
        </div>

        {totalMissed>0&&(
          <div style={{background:'#fee2e2',borderRadius:12,padding:'10px 14px',marginBottom:12,fontSize:13,color:'#dc2626',fontWeight:600}}>
            ⚠️ {totalMissed} missed daily report{totalMissed!==1?'s':''} this period
          </div>
        )}

        {months.length===0&&<div style={{textAlign:'center',color:'var(--muted)',marginTop:30}}>No reports submitted yet.</div>}

        {months.map(mk=>{
          const [y,m]=mk.split('-').map(Number);
          const monthReports=[...byMonth[mk]].sort((a,b)=>b.date>a.date?1:-1);
          const missed=getMissedDays(reports,selectedMember.code,y,m);
          const isOpen=openMonth===mk;
          return(
            <div key={mk} style={{background:'#fff',borderRadius:14,boxShadow:'var(--shadow)',overflow:'hidden',marginBottom:10}}>
              <div onClick={()=>setOpenMonth(isOpen?null:mk)}
                style={{display:'flex',alignItems:'center',justifyContent:'space-between',
                  padding:'12px 14px',cursor:'pointer',background:isOpen?'var(--blue)':'#fff'}}>
                <div style={{display:'flex',alignItems:'center',gap:10}}>
                  <span style={{fontSize:20}}>📁</span>
                  <div>
                    <div style={{fontWeight:700,fontSize:14,color:isOpen?'#fff':'var(--text)'}}>{getMonthLabel(mk)}</div>
                    <div style={{fontSize:11,color:isOpen?'rgba(255,255,255,.7)':'var(--muted)'}}>
                      {monthReports.length} report{monthReports.length!==1?'s':''}
                      {missed.length>0&&<span style={{color:isOpen?'#fca5a5':'#dc2626',fontWeight:700}}> · {missed.length} missed</span>}
                    </div>
                  </div>
                </div>
                <span style={{color:isOpen?'#fff':'var(--muted)',fontSize:18}}>{isOpen?'▾':'▸'}</span>
              </div>
              {isOpen&&(
                <div style={{padding:'10px 14px'}}>
                  {missed.length>0&&(
                    <div style={{background:'#fee2e2',borderRadius:10,padding:'8px 12px',marginBottom:10,fontSize:12,color:'#dc2626',fontWeight:600}}>
                      ⚠️ Missed: {missed.map(d=>`${d} ${getMonthLabel(mk).split(' ')[0]}`).join(', ')}
                    </div>
                  )}
                  {monthReports.map(r=>(
                    <div key={r.id} style={{borderBottom:'1px solid var(--border)',paddingBottom:10,marginBottom:10}}>
                      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
                        <span style={{fontSize:11,fontWeight:700,padding:'2px 10px',borderRadius:99,
                          background:typeColor[r.type]||'#eee',color:typeText[r.type]||'#333'}}>
                          {r.type.toUpperCase()}
                        </span>
                        <span style={{fontSize:11,color:'var(--muted)'}}>
                          {new Date(r.date).toLocaleDateString('en-NG',{weekday:'short',day:'numeric',month:'short'})}
                        </span>
                      </div>
                      <div style={{fontSize:13,lineHeight:1.6,marginBottom:6}}>{r.text}</div>
                      {(r.replies||[]).map((rep,i)=>(
                        <div key={i} style={{marginLeft:12,paddingLeft:10,borderLeft:'2px solid var(--gold)',
                          fontSize:12,color:'var(--muted)',marginBottom:4,background:'#fefce8',
                          borderRadius:'0 6px 6px 0',padding:'4px 8px'}}>
                          <b style={{color:'var(--text)'}}>{rep.by}:</b> {rep.text}
                          <span style={{fontSize:10,marginLeft:6}}>{fmtTime(rep.time)}</span>
                        </div>
                      ))}
                      {replyTarget===r.id?(
                        <div style={{marginTop:6,display:'flex',gap:6}}>
                          <input value={replyText} onChange={e=>setReplyText(e.target.value)}
                            placeholder="Write reply..." onKeyDown={e=>e.key==='Enter'&&submitReply(r.id)}
                            style={{flex:1,padding:'7px 10px',border:'1.5px solid var(--border)',borderRadius:8,fontSize:12,outline:'none'}}/>
                          <Btn small onClick={()=>submitReply(r.id)}>Send</Btn>
                          <Btn small variant="outline" onClick={()=>setReplyTarget(null)}>✕</Btn>
                        </div>
                      ):(
                        <button onClick={()=>setReplyTarget(r.id)}
                          style={{marginTop:4,background:'none',border:'none',color:'var(--blue)',fontSize:11,fontWeight:600,cursor:'pointer'}}>
                          💬 Reply
                        </button>
                      )}
                    </div>
                  ))}
                </div>
              )}
            </div>
          );
        })}
      </div>
    );
  }

  // Member list view
  return(
    <div style={{paddingBottom:16}}>
      <div style={{fontWeight:700,marginBottom:10,fontSize:14}}>
        📋 Team Report Files ({reportingTo.length} members)
      </div>
      {reportingTo.map(m=>{
        const mReports=getMemberReports(m.code);
        const thisMonth=getMonthKey(TODAY);
        const thisMonthReports=mReports.filter(r=>getMonthKey(r.date)===thisMonth);
        const [y,mo]=thisMonth.split('-').map(Number);
        const missed=getMissedDays(reports,m.code,y,mo);
        const lastReport=mReports.sort((a,b)=>b.date>a.date?1:-1)[0];
        return(
          <div key={m.code||m.id} onClick={()=>setSelectedMember(m)}
            style={{background:'#fff',borderRadius:12,padding:'12px 14px',marginBottom:8,
              boxShadow:'var(--shadow)',cursor:'pointer',display:'flex',alignItems:'center',gap:10}}>
            <Ava user={m} size={36}/>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontWeight:600,fontSize:14,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{m.name}</div>
              <Bdg role={m.role} small/>
              <div style={{fontSize:11,color:'var(--muted)',marginTop:2}}>
                {thisMonthReports.length} this month
                {missed.length>0&&<span style={{color:'#dc2626',fontWeight:700}}> · {missed.length} missed ⚠️</span>}
              </div>
              {lastReport&&<div style={{fontSize:11,color:'var(--muted)'}}>Last: {fmtDate(lastReport.date)}</div>}
            </div>
            <div style={{textAlign:'right'}}>
              <div style={{fontWeight:800,fontSize:16,color:'var(--blue)'}}>{mReports.length}</div>
              <div style={{fontSize:10,color:'var(--muted)'}}>total</div>
            </div>
            <span style={{color:'var(--muted)',fontSize:20}}>›</span>
          </div>
        );
      })}
      {reportingTo.length===0&&<div style={{textAlign:'center',color:'var(--muted)',marginTop:30}}>No team members yet.</div>}
    </div>
  );
}

function AccountTab({user,users,saveUsers}){
  const [form,setForm]=useState({name:user.name,phone:user.phone||'',state:user.state||'',accName:user.accName||'',accNum:user.accNum||'',bank:user.bank||''});
  const [pw,setPw]=useState('');const [pw2,setPw2]=useState('');
  const [ok,setOk]=useState('');const [err,setErr]=useState('');
  const set=k=>e=>setForm(f=>({...f,[k]:e.target.value}));
  const saveProfile=async()=>{
    const k=user.code||user.id;
    await saveUsers({...users,[k]:{...user,...form}});
    setOk('Saved!');setTimeout(()=>setOk(''),3000);
  };
  const changePw=async()=>{
    
    if(pw!==pw2){setErr('Passwords do not match');return;}
    const k=user.code||user.id;
    await saveUsers({...users,[k]:{...user,password:pw}});
    setPw('');setPw2('');setOk('Password updated!');setErr('');setTimeout(()=>setOk(''),3000);
  };
  const saveAva=async b64=>{
    const k=user.code||user.id;
    await saveUsers({...users,[k]:{...user,avatar:b64}});
  };
  return(
    <div style={{display:'flex',flexDirection:'column',gap:12,paddingBottom:16}}>
      <div style={{background:'#fff',borderRadius:14,padding:'20px',boxShadow:'var(--shadow)',textAlign:'center'}}>
        <AvaUpload user={user} onSave={saveAva}/>
        <div style={{fontWeight:700,fontSize:16,marginTop:10}}>{user.name}</div>
        <Bdg role={user.role}/>
        {user.code&&<div style={{fontSize:12,color:'var(--muted)',marginTop:4}}>Code: {user.code}</div>}
      </div>
      <div style={{background:'#fff',borderRadius:14,padding:'16px',boxShadow:'var(--shadow)'}}>
        <div style={{fontWeight:700,marginBottom:12}}>Profile Info</div>
        {ok&&<Alrt type="success" msg={ok}/>}
        <Inp label="Full Name" value={form.name} onChange={set('name')}/>
        <Inp label="Phone" value={form.phone} onChange={set('phone')} type="tel"/>
        <Inp label="State" value={form.state} onChange={set('state')}/>
        <div style={{fontWeight:700,marginBottom:10,marginTop:4,color:'var(--muted)',fontSize:13}}>Bank Details</div>
        <Inp label="Account Name" value={form.accName} onChange={set('accName')}/>
        <Inp label="Account Number" value={form.accNum} onChange={set('accNum')}/>
        <Inp label="Bank Name" value={form.bank} onChange={set('bank')}/>
        <Btn onClick={saveProfile} full>Save Changes</Btn>
      </div>
      <div style={{background:'#fff',borderRadius:14,padding:'16px',boxShadow:'var(--shadow)'}}>
        <div style={{fontWeight:700,marginBottom:12}}>Change Password</div>
        {err&&<Alrt type="error" msg={err} onClose={()=>setErr('')}/>}
        <PwInp label="New Password" value={pw} onChange={e=>setPw(e.target.value)}/>
        <PwInp label="Confirm Password" value={pw2} onChange={e=>setPw2(e.target.value)}/>
        <Btn onClick={changePw} variant="outline" full>Update Password</Btn>
      </div>
    </div>
  );
}

// ── MEMBER SUMMARY MODAL ───────────────────────────────────────────────────
function MemberSummaryModal({member,users,signups,reports,onClose}){
  const {start}=getMonthRange();
  const confirmedMonth=signups.filter(s=>s.date>=start&&s.founderApproved!==false);
  const directTeam=Object.values(users).filter(u=>u.referredBy===member.code&&u.approved&&!u.resigned);
  const treeSize=getFullTree(member.code||member.id,users).length;
  const myReports=(reports||[]).filter(r=>r.userCode===member.code&&r.date>=start);
  const totalDed=(member.deductions||[]).reduce((a,d)=>a+(d.amount||0),0);
  const totalBon=(member.bonuses||[]).reduce((a,b)=>a+(b.amount||0),0);

  let teamSignups=0,earnings=0,target=0,teamLabel='',earningRate='';
  if(member.role==='ambassador'){
    teamSignups=confirmedMonth.filter(s=>s.ref===member.code).length;
    earnings=(Math.min(teamSignups,50)*500)+(Math.max(0,teamSignups-50)*700);
    target=100;teamLabel='Sign-ups';earningRate='₦500–₦700/sign-up';
  }
  if(member.role==='cc'){
    const ambCodes=directTeam.map(a=>a.code);
    teamSignups=confirmedMonth.filter(s=>ambCodes.includes(s.ref)).length;
    earnings=teamSignups*200;target=2000;teamLabel='Team Sign-ups';earningRate='₦200/sign-up';
  }
  if(member.role==='pm'){
    const ccList=directTeam;
    const ambList=Object.values(users).filter(u=>ccList.map(c=>c.code).includes(u.referredBy)&&u.approved&&!u.resigned);
    teamSignups=confirmedMonth.filter(s=>ambList.map(a=>a.code).includes(s.ref)).length;
    earnings=teamSignups*100;target=20000;teamLabel='State Sign-ups';earningRate='₦100/sign-up';
  }
  if(member.role==='pfc'){
    const pmList=directTeam;
    const ccList=Object.values(users).filter(u=>pmList.map(p=>p.code).includes(u.referredBy)&&u.approved&&!u.resigned);
    const ambList=Object.values(users).filter(u=>ccList.map(c=>c.code).includes(u.referredBy)&&u.approved&&!u.resigned);
    teamSignups=confirmedMonth.filter(s=>ambList.map(a=>a.code).includes(s.ref)).length;
    earnings=teamSignups*50;target=100000;teamLabel='PFC Sign-ups';earningRate='₦50/sign-up';
  }
  const net=Math.max(0,earnings-totalDed+totalBon);
  const pct=Math.min(100,Math.round(teamSignups/(target||1)*100));
  const color=ROLE_COLORS[member.role]||'var(--blue)';
  return(
    <Modal title="Member Summary" onClose={onClose}>
      <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:14,padding:'12px',background:'var(--bg)',borderRadius:12}}>
        <Ava user={member} size={52}/>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontWeight:800,fontSize:16}}>{member.name}</div>
          <Bdg role={member.role}/>
          <div style={{fontSize:11,color:'var(--muted)',marginTop:3}}>{member.code} · {member.state||'—'} · Joined {fmtDate(member.joined)}</div>
        </div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:12}}>
        <div style={{background:'var(--bg)',borderRadius:10,padding:'10px',textAlign:'center'}}>
          <div style={{fontSize:20,fontWeight:800,color}}>{teamSignups.toLocaleString()}</div>
          <div style={{fontSize:10,color:'var(--muted)',marginTop:2}}>{teamLabel}</div>
        </div>
        <div style={{background:'var(--bg)',borderRadius:10,padding:'10px',textAlign:'center'}}>
          <div style={{fontSize:20,fontWeight:800,color:'var(--green)'}}>{directTeam.length}</div>
          <div style={{fontSize:10,color:'var(--muted)',marginTop:2}}>Direct Team</div>
        </div>
        <div style={{background:'var(--bg)',borderRadius:10,padding:'10px',textAlign:'center'}}>
          <div style={{fontSize:20,fontWeight:800,color:'var(--purple)'}}>{treeSize}</div>
          <div style={{fontSize:10,color:'var(--muted)',marginTop:2}}>Total Tree</div>
        </div>
      </div>
      <div style={{background:'#fff',borderRadius:12,padding:'12px 14px',marginBottom:10,boxShadow:'var(--shadow)'}}>
        <div style={{display:'flex',justifyContent:'space-between',fontSize:12,marginBottom:6}}>
          <span style={{fontWeight:600}}>Progress to target</span>
          <span style={{fontWeight:700,color}}>{pct}%</span>
        </div>
        <div style={{background:'var(--bg)',borderRadius:99,height:8}}>
          <div style={{width:pct+'%',height:'100%',background:pct>=80?'var(--green)':pct>=50?'var(--gold)':'#dc2626',borderRadius:99}}/>
        </div>
        <div style={{fontSize:11,color:'var(--muted)',marginTop:4}}>{teamSignups.toLocaleString()} / {target.toLocaleString()}</div>
      </div>
      <div style={{background:'#fff',borderRadius:12,padding:'12px 14px',marginBottom:10,boxShadow:'var(--shadow)'}}>

function ConfirmTab({signups,saveSignups,pushNotif,users}){
  const pending=signups.filter(s=>s.pfcStatus==='Pending');
  const confirm=async id=>{
    const su=signups.find(s=>s.id===id);if(!su)return;
    const ns=signups.map(s=>s.id===id?{...s,pfcStatus:'Confirmed',confirmedAt:new Date().toISOString(),paymentLog:{
      paidBy:su.name,email:su.email,phone:su.phone,siteName:su.siteName,amount:2000,ref:su.ref,confirmedAt:new Date().toISOString()
    }}:s);
    await saveSignups(ns);
    // Notify the referring ambassador
    if(su.ref)await pushNotif(su.ref,`💰 Payment confirmed from ${su.name}! Site build queued.`);
    // Notify full upline tree
    if(su.ref&&pushNotif){
      // Walk up the tree to notify all upline
      let currentCode=su.ref;
      const visited=new Set();
      while(currentCode&&!visited.has(currentCode)){
        visited.add(currentCode);
        const member=Object.values(users||{}).find(u=>(u.code||u.id)===currentCode);
        if(!member)break;
        if(member.role!=='ambassador')await pushNotif(currentCode,`💰 Payment: ${su.name} paid for site via ${su.ref}. Tree credit for your network.`);
        currentCode=member.referredBy;
      }
    }
  };
  const reject=async id=>{await saveSignups(signups.map(s=>s.id===id?{...s,pfcStatus:'Rejected'}:s));};
  return(
    <div>
      <div style={{fontWeight:700,marginBottom:10,fontSize:14}}>Pending Confirmations ({pending.length})</div>
      {pending.map(s=>(
        <div key={s.id} style={{background:'#fff',borderRadius:12,padding:'12px 14px',marginBottom:8,boxShadow:'var(--shadow)'}}>
          <div style={{fontWeight:600}}>{s.name}</div>
          <div style={{fontSize:12,color:'var(--muted)'}}>{s.email} · {s.phone}</div>
          <div style={{fontSize:12,color:'var(--muted)'}}>Site: {s.siteName} · Ref: {s.ref||'None'}</div>
          <div style={{display:'flex',gap:8,marginTop:8}}>
            <Btn small onClick={()=>confirm(s.id)} variant="green">✓ Confirm</Btn>
            <Btn small onClick={()=>reject(s.id)} variant="danger">✗ Reject</Btn>
          </div>
        </div>
      ))}
      {pending.length===0&&<div style={{textAlign:'center',color:'var(--muted)',marginTop:40}}>No pending confirmations.</div>}
    </div>
  );
}

// ── TREE HELPERS ───────────────────────────────────────────────────────────
// Returns all codes in the full downline tree under a given code (BFS)
function getFullTree(rootCode, allUsers){
  const result=[];
  const queue=[rootCode];
  while(queue.length){
    const cur=queue.shift();
    const children=Object.values(allUsers).filter(u=>u.referredBy===cur);
    children.forEach(c=>{result.push(c.code||c.id);queue.push(c.code||c.id);});
  }
  return result;
}

    const a=parseFloat(amt);if(!a||a<=0)return;
    const k=u.code||u.id;
    const entry={amount:a,reason,date:TODAY};
    const updated={...u,[mode==='ded'?'deductions':'bonuses']:[...(u[mode==='ded'?'deductions':'bonuses']||[]),entry]};
    await saveUsers({...users,[k]:updated});
    await pushNotif(k,`${mode==='ded'?'Deduction':'Bonus'} of ${fmt(a)} applied. Reason: ${reason}`);
    // Send email

      const{subject:fSubj,html:fHtml}=EMAILS.deduction(u.name,a,reason);
      await sendEmail(u.email,u.name,fSubj,fHtml);

    setOk(`${mode==='ded'?'Deduction':'Bonus'} applied!`);setAmt('');setReason('');setTimeout(()=>setOk(''),3000);
  };
  const clearAll=async field=>{const k=u.code||u.id;await saveUsers({...users,[k]:{...u,[field]:[]}});setOk('Cleared!');setTimeout(()=>setOk(''),2000);};

function FounderPanel({appState}){
  const{users,saveUsers,signups,saveSignups,settings,saveSettings,broadcasts,saveBroadcasts,pushNotif}=appState;

  const [fineTarget,setFineTarget]=useState(null);
  const [resignTarget,setResignTarget]=useState(null);  // user being resigned
  const [promoteTarget,setPromoteTarget]=useState(null); // {user, direction:'up'|'down'}
  const [moveTarget,setMoveTarget]=useState(null);       // after resign: {user, replacementCode}
  const [showHrInvite,setShowHrInvite]=useState(false);
  const {start}=getMonthRange();

  const allApproved=Object.values(users).filter(u=>u.approved&&u.id!=='FOUNDER'&&!u.resigned);
  const thisMonthSu=signups.filter(s=>s.date>=start);
  const confirmed=signups.filter(s=>s.pfcStatus==='Confirmed');
  const built=signups.filter(s=>s.siteBuilt);
  const noRef=signups.filter(s=>!s.ref||s.ref.trim()==='');
  const pendingMembers=Object.values(users).filter(u=>u.approved&&!u.verified&&u.id!=='FOUNDER'&&!u.resigned);
  const pendingSignups=signups.filter(s=>s.founderApproved===false||s.founderApproved===undefined);
  const revenue=thisMonthSu.length*950;

  // ── APPROVE MEMBER ──
  const approveMember=async id=>{
    const u=users[id];if(!u)return;
    const nc=genCode(u.role,users);
    // Build approved record — keep original password and email exactly as registered
    const approved={
      ...u,
      id:nc,
      code:nc,
      approved:true,
      // Normalize email to lowercase
      email:(u.email||'').toLowerCase(),
      notifications:[
        {msg:`✅ Your account has been approved! Your member code is ${nc}. Log in with your registered email and password.`,
         time:new Date().toISOString(),read:false},
        ...(u.notifications||[])
      ]
    };
    // Build new users object — add new record, remove old pending record
    const nu={...users,[nc]:approved};
    delete nu[id];
    // Save to Firebase — this overwrites the full users object
    await saveUsers(nu);
    alert(`✅ ${u.name} Approved!\n\nCode: ${nc}\nEmail: ${u.email}\nPassword: (their own password)\n\nThey can log in immediately with their email and password.`);
  };
  const rejectMember=async id=>{const nu={...users};delete nu[id];await saveUsers(nu);};

  // ── APPROVE SIGN-UP ──
  const approveSignup=async id=>{
    const ns=signups.map(s=>s.id===id?{...s,founderApproved:true,pfcStatus:'Confirmed'}:s);
    await saveSignups(ns);
    const su=signups.find(s=>s.id===id);
    if(su?.ref)await pushNotif(su.ref,`✅ Sign-up from ${su.name} approved by Founder!`);
  };
  const rejectSignup=async id=>{
    const ns=signups.map(s=>s.id===id?{...s,founderApproved:false,pfcStatus:'Rejected'}:s);
    await saveSignups(ns);
  };

  // ── RESIGN + TREE TRANSFER ──
  // getFullTree is defined outside: returns all descendant codes
  const doResign=async(resignedCode, replacementCode)=>{
    if(!replacementCode){alert('Please choose a replacement first.');return;}
    const nu={...users};
    const resigned=nu[resignedCode];
    if(!resigned)return;
    // 1. Find direct reports of resigned person
    const directReports=Object.values(nu).filter(u=>u.referredBy===resignedCode);
    // 2. Reassign their referredBy to replacement
    directReports.forEach(u=>{
      const k=u.code||u.id;
      nu[k]={...nu[k],referredBy:replacementCode};
    });
    // 3. Mark resigned person as resigned (locked out, kept in records)
    nu[resignedCode]={...resigned,resigned:true,approved:false,resignedDate:TODAY};
    await saveUsers(nu);
    await pushNotif(replacementCode,`You have inherited the downline of ${resigned.name} (${resignedCode}).`);
    setResignTarget(null);setMoveTarget(null);
    alert(`Done. ${resigned.name} has been resigned.\nTheir direct team has been moved to ${nu[replacementCode]?.name}.`);
  };

  // ── PROMOTE / DEMOTE ──
  const ROLE_ORDER=['ambassador','cc','pm','pfc'];
  const doPromote=async(userCode,direction)=>{
    const u=users[userCode];if(!u)return;
    const idx=ROLE_ORDER.indexOf(u.role);
    const newRole=direction==='up'?ROLE_ORDER[idx+1]:ROLE_ORDER[idx-1];
    if(!newRole){alert('Cannot promote/demote further.');return;}
    const nc=genCode(newRole,users);
    const nu={...users};
    // move record to new code key
    nu[nc]={...u,role:newRole,code:nc};
    delete nu[userCode];
    // update any referredBy pointing to old code
    Object.keys(nu).forEach(k=>{if(nu[k].referredBy===userCode)nu[k]={...nu[k],referredBy:nc};});
    await saveUsers(nu);
    setPromoteTarget(null);
    alert(`✅ ${u.name} ${direction==='up'?'promoted':'demoted'} to ${ROLE_LABELS[newRole]}.\nNew code: ${nc}`);
  };

  // ── RESIGN MODAL ──
  const ResignModal=({u})=>{

    const [msg,setMsg]=useState('');const [role,setRole]=useState('all');const [ok,setOk]=useState('');
    const send=async()=>{
      if(!msg.trim())return;
      await saveBroadcasts([...broadcasts,{id:'bc_'+Date.now(),message:msg,role,time:new Date().toISOString()}]);
      // Send email to all relevant members
      const targets=Object.values(users).filter(u=>u.approved&&u.email&&(role==='all'||u.role===role)&&u.id!=='FOUNDER');
      for(const t of targets){
        const{subject:bSubj,html:bHtml}=EMAILS.broadcast(t.name,msg);
        await sendEmail(t.email,t.name,bSubj,bHtml);
      }
      setMsg('');setOk('Sent!');setTimeout(()=>setOk(''),3000);
    };
    return(
      <div>
        <div style={{background:'#fff',borderRadius:14,padding:'16px',marginBottom:12,boxShadow:'var(--shadow)'}}>

  // ── SETTINGS ──
  const SettingsTab=()=>{
    const [form,setForm]=useState(settings||DEFAULT_SETTINGS);const [ok,setOk]=useState('');

    const save=async()=>{await saveSettings(form);setOk('Saved!');setTimeout(()=>setOk(''),3000);};
    return(
      <div style={{background:'#fff',borderRadius:14,padding:'16px',boxShadow:'var(--shadow)'}}>
        <div style={{fontWeight:700,marginBottom:14}}>⚙️ Payment Settings</div>
        {ok&&<Alrt type="success" msg={ok}/>}

      </div>
    );
  };

  // ── MANUAL ADD MEMBER ──
  const [showManualAdd,setShowManualAdd]=useState(false);

  const ManualAddModal=()=>{
    const [form,setForm]=useState({name:'',phone:'',email:'',password:'',state:'',role:'ambassador',ref:'',accName:'',accNum:'',bank:''});// smm role also available
    const [ok,setOk]=useState('');const [err,setErr]=useState('');
    const set=k=>e=>setForm(f=>({...f,[k]:e.target.value}));
    const add=async()=>{
      if(!form.name||!form.email||!form.password){setErr('Name, email and password required');return;}
      if(Object.values(users).find(u=>u.email===form.email)){setErr('Email already exists');return;}
      const nc=genCode(form.role,users);
      const newMember={
        id:nc,code:nc,name:form.name,phone:form.phone,email:form.email,
        password:form.password,state:form.state,role:form.role,
        referredBy:form.ref||'',accName:form.accName,accNum:form.accNum,bank:form.bank,
        joined:TODAY,approved:true,avatar:'',notifications:[
          {msg:`Welcome to RehoVTU! Your code is ${nc}. Login with your email and password.`,time:new Date().toISOString(),read:false}
        ],deductions:[],bonuses:[]
      };
      await saveUsers({...users,[nc]:newMember});
      setOk(`✅ Member added!\nCode: ${nc}\nPassword: ${form.password}\n\nShare these with ${form.name}`);
      alert(`✅ Member Added Successfully!\n\nName: ${form.name}\nCode: ${nc}\nEmail: ${form.email}\nPassword: ${form.password}\n\nShare these login details with them now.`);
      setForm({name:'',phone:'',email:'',password:'',state:'',role:'ambassador',ref:'',accName:'',accNum:'',bank:''});
    };
    return(
      <Modal title="➕ Add Member Manually" onClose={()=>setShowManualAdd(false)}>
        <div style={{background:'#fff8f0',border:'1px solid var(--gold)',borderRadius:10,padding:'10px 12px',marginBottom:14,fontSize:12,color:'#92400e'}}>
          ⚡ Use this to add members directly — bypasses registration. Great when Supabase is down or someone can't register.
        </div>
        {err&&<Alrt type="error" msg={err} onClose={()=>setErr('')}/>}
        {ok&&<Alrt type="success" msg={ok}/>}
        <Inp label="Full Name" value={form.name} onChange={set('name')} required/>
        <Inp label="Email" value={form.email} onChange={set('email')} type="email" required/>
        <Inp label="Phone" value={form.phone} onChange={set('phone')} type="tel"/>
        <PwInp label="Password" value={form.password} onChange={set('password')}/>
        <Inp label="State" value={form.state} onChange={set('state')} placeholder="e.g. Lagos"/>
        <Sel label="Role" value={form.role} onChange={set('role')} options={[
          {v:'ambassador',l:'Ambassador'},
          {v:'cc',l:'Campus Coordinator (CC)'},
          {v:'pm',l:'State Project Manager (PM)'},
          {v:'pfc',l:'Project & Finance Coordinator (PFC)'},
          {v:'smm',l:'Social Media Manager (SMM)'},
          {v:'hr',l:'HR Manager (HR)'}
        ]}/>
        <Inp label="Referred By (code)" value={form.ref} onChange={set('ref')} placeholder="e.g. CC001"/>
        <div style={{background:'#f8f9ff',borderRadius:10,padding:'12px',marginBottom:4}}>
          <div style={{fontSize:12,fontWeight:700,color:'var(--muted)',marginBottom:8}}>Bank Details (optional)</div>
          <Inp label="Account Name" value={form.accName} onChange={set('accName')}/>
          <Inp label="Account Number" value={form.accNum} onChange={set('accNum')}/>
          <Inp label="Bank Name" value={form.bank} onChange={set('bank')}/>
        </div>
        <Btn full onClick={add} variant="green" style={{marginTop:8}}>➕ Add Member & Generate Code</Btn>
      </Modal>
    );
  };

  // ── CSV EXPORT (all roles) ──
  const exportCSV=()=>{
    const rows=ROLES.filter(r=>r!=='founder').flatMap(role=>
      Object.values(users).filter(u=>u.role===role&&u.approved&&!u.resigned).map(u=>{
        const su=signups.filter(s=>s.ref===u.code&&s.date>=start&&s.founderApproved!==false).length;
        const {gross,totalDed,totalBon,net}=calcNet(su,u.deductions,u.bonuses);
        return `"${u.name}",${ROLE_LABELS[role]},${u.code},${u.state||''},${su},${gross},${totalDed},${totalBon},${net},"${u.accName||''}","${u.accNum||''}","${u.bank||''}"`;
      })
    );
    const blob=new Blob(['Name,Role,Code,State,Signups,Gross,Ded,Bonus,Net,AccName,AccNum,Bank\n'+rows.join('\n')],{type:'text/csv'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='rehovtu_payroll.csv';a.click();
  };

  const pendingCount=pendingMembers.length+pendingSignups.filter(s=>s.founderApproved===undefined).length;

  const TABS=[
    {id:'overview',label:'Overview'},
    {id:'pending',label:'Unverified',badge:pendingMembers.length},
    {id:'signups_q',label:'Sign-ups',badge:pendingSignups.filter(s=>s.founderApproved===undefined).length},
    {id:'ambs',label:'Ambs'},
    {id:'ccs',label:'CCs'},
    {id:'pms',label:'PMs'},
    {id:'pfcs',label:'PFCs'},
    {id:'allsu',label:'All SU'},
    {id:'payments',label:'💰 Payments'},
    {id:'leaderboard',label:'🏆'},
    {id:'broadcasts',label:'📢'},
    {id:'banner',label:'🖼 Banner'},
    {id:'hr',label:'👤 HR'},
    {id:'settings',label:'⚙️'},
  ];

  return(
    <div>
      {fineTarget&&<Modal title="Fines & Bonuses" onClose={()=>setFineTarget(null)}>
        <FineManager target={fineTarget} users={users} saveUsers={saveUsers} pushNotif={pushNotif}/>

        <Btn small variant="ghost" onClick={()=>setTab('settings')}>⚙ Settings</Btn>
        <Btn small variant="ghost" onClick={exportCSV}>↓ CSV</Btn>
        <Btn small variant="primary" onClick={()=>setTab('broadcasts')}>📢 Broadcast</Btn>
        {pendingCount>0&&<Btn small variant="danger" onClick={()=>setTab('pending')}>⚠ {pendingCount} Pending</Btn>}
      </div>

      <Tabs tabs={TABS} active={tab} onSelect={setTab}/>
      <div style={{marginTop:12}}>
        {tab==='overview'&&<Overview/>}
        {tab==='pending'&&<PendingMembersTab/>}
        {tab==='signups_q'&&<PendingSignupsTab/>}
        {tab==='ambs'&&<RoleList role="ambassador"/>}

        <div style={{fontWeight:800,fontSize:18,marginBottom:4}}>👁 Dashboard Preview</div>
        <div style={{fontSize:13,opacity:.85,lineHeight:1.5}}>See exactly what any team member sees on their dashboard — in real time, with real data.</div>
      </div>

      {PREVIEW_ROLES.map(({role,label,icon,color})=>{
        const members=(byRole[role]||[]);
        return(
          <div key={role} style={{background:'#fff',borderRadius:14,padding:'14px 16px',marginBottom:10,boxShadow:'var(--shadow)'}}>
