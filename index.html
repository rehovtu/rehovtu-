// ── APP STATE ──────────────────────────────────────────────────────────────
function useAppState(){
  const [screen,setScreen]=useState('loading');
  const [user,setUser]=useState(null);
  const [users,setUsers]=useState({});
  const [signups,setSignups]=useState([]);
  const [settings,setSettings]=useState(DEFAULT_SETTINGS);
  const [broadcasts,setBroadcasts]=useState([]);
  const [dms,setDms]=useState([]);
  const [grp,setGrp]=useState([]);
  const [reports,setReports]=useState([]);
  const [inviteTokens,setInviteTokens]=useState({});

  const saveUsers=async u=>{
    setUsers(u);
    // Clear stale cache first so Firebase version is always authoritative
    localStorage.removeItem('rv_users');
    await DB.set('users',u);
  };
  const saveSignups=async s=>{setSignups(s);await DB.set('signups',s);};
  const saveSettings=async s=>{
    setSettings(s);
    // Clear localStorage cache so ALL devices fetch fresh from Firebase
    localStorage.removeItem('rv_settings');
    await DB.set('settings',s);
  };
  const saveBroadcasts=async b=>{setBroadcasts(b);await DB.set('broadcasts',b);};
  const saveDms=async d=>{setDms(d);await DB.set('dms',d);};
  const saveGrp=async g=>{setGrp(g);await DB.set('grp',g);};
  const saveReports=async r=>{setReports(r);await DB.set('reports',r);};

  const pushNotif=async(code,msg)=>{
    const nu={...users};
    if(nu[code]){
      nu[code].notifications=[{msg,time:new Date().toISOString(),read:false},...(nu[code].notifications||[])];
      await saveUsers(nu);
    }
  };

  // ── AUTO DAILY FINE DEDUCTION ─────────────────────────────────────────────
  // Runs once on load: for each approved non-founder member, check if yesterday
  // had a missed daily report and no fine was already applied for that date.
  const autoApplyFines=async(currentUsers,currentReports)=>{
    const yesterday=new Date();yesterday.setDate(yesterday.getDate()-1);
    if(yesterday.getDay()===0)return; // skip Sundays
    const yd=yesterday.toISOString().split('T')[0];
    const ym=yesterday.getFullYear();
    const ymm=yesterday.getMonth()+1;
    const yday=yesterday.getDate();
    let changed=false;
    const nu={...currentUsers};
    Object.values(currentUsers).forEach(u=>{
      if(!u.approved||u.role==='founder'||u.role==='smm'||u.role==='hr'||u.resigned)return;
      const role=u.role;
      const fineAmt=(DEDUCTIONS[role]||{daily:500}).daily;
      const code=u.code||u.id;
      // Check if already fined for yesterday
      const alreadyFined=(u.deductions||[]).some(d=>d.date===yd&&d.reason&&d.reason.includes('Auto: missed daily report'));
      if(alreadyFined)return;
      // Check if they submitted a daily report for yesterday
      const submitted=currentReports.some(r=>r.userCode===code&&r.type==='daily'&&r.date===yd);
      if(!submitted){
        const entry={amount:fineAmt,reason:'Auto: missed daily report ('+yd+')',date:yd,auto:true};
        nu[code]={...nu[code],deductions:[...(nu[code].deductions||[]),entry],
          notifications:[{msg:'⚠️ ₦'+fineAmt.toLocaleString()+' deducted — missed daily report on '+yd,time:new Date().toISOString(),read:false},...(nu[code].notifications||[])]};
        changed=true;
      }
    });
    if(changed)await saveUsers(nu);
  };

  useEffect(()=>{
    const ref=new URLSearchParams(window.location.search).get('ref');
    if(ref)sessionStorage.setItem('ref_code',ref);
    setTimeout(async()=>{
      try{
        const[u,s,st,b,d,g,r,inv]=await Promise.all([DB.get('users'),DB.get('signups'),DB.get('settings'),DB.get('broadcasts'),DB.get('dms'),DB.get('grp'),DB.get('reports'),DB.get('inviteTokens')]);
        const au=u||{};
        if(!au['FOUNDER'])au['FOUNDER']=FOUNDER_ACCT;
        const rep=r||[];
        setUsers(au);setSignups(s||[]);setSettings(st||DEFAULT_SETTINGS);
        setBroadcasts(b||[]);setDms(d||[]);setGrp(g||[]);setReports(rep);
        setInviteTokens(inv||{});
        try{await autoApplyFines(au,rep);}catch(e){console.warn('Auto-fine error:',e);}
      }catch{}
      setScreen('landing');
    },1600);
  },[]);

  // sync logged-in user with store
  useEffect(()=>{
    if(user&&users){
      const k=user.code||user.id;
      if(users[k]&&JSON.stringify(users[k])!==JSON.stringify(user))setUser(users[k]);
    }
  },[users]);

  const saveInviteTokens=async t=>{setInviteTokens(t);await DB.set('inviteTokens',t);};
  return{screen,setScreen,user,setUser,users,saveUsers,signups,saveSignups,settings,saveSettings,broadcasts,saveBroadcasts,dms,saveDms,grp,saveGrp,reports,saveReports,pushNotif,inviteTokens,saveInviteTokens};
}

                const pct=posts.length>0?Math.round((count/posts.length)*100):0;
                return(

                    <div style={{display:'flex',justifyContent:'space-between',marginBottom:3}}>
                      <span style={{fontSize:13}}>{pl.icon} {pl.label}</span>
                      <span style={{fontSize:13,fontWeight:600}}>{count} posts</span>
                    </div>
                    <div style={{background:'#f1f5f9',borderRadius:99,height:6}}>
                      <div style={{background:pl.color,borderRadius:99,height:6,width:pct+'%',transition:'width .3s'}}/>

            <div style={{background:'#fff',borderRadius:14,padding:'14px 16px',boxShadow:'var(--shadow)'}}>
              <div style={{fontWeight:700,fontSize:13,color:'var(--muted)',letterSpacing:.5,marginBottom:10}}>TEAM ACTIVITY</div>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:13,marginBottom:6}}><span>Total members</span><span style={{fontWeight:700}}>{totalMembers}</span></div>

  );

// Mini broadcast composer for SMM
function BroadcastCompose({broadcasts,saveBroadcasts}){
  const [msg,setMsg]=useState('');const [role,setRole]=useState('all');const [ok,setOk]=useState('');
  const send=async()=>{
    if(!msg.trim())return;
    const b={id:'bc_'+Date.now(),message:msg,role,time:new Date().toISOString(),type:'broadcast'};
    await saveBroadcasts([...(broadcasts||[]),b]);
    setMsg('');setOk('Broadcast sent!');setTimeout(()=>setOk(''),3000);
  };
  return(
    <div style={{background:'#fff',borderRadius:14,padding:16,boxShadow:'var(--shadow)'}}>
      {ok&&<Alrt type="success" msg={ok}/>}
      <Inp label="Message" value={msg} onChange={e=>setMsg(e.target.value)} placeholder="Type your broadcast message..." rows={4}/>
      <Sel label="Send to" value={role} onChange={e=>setRole(e.target.value)} options={[{v:'all',l:'Everyone'},{v:'pfc',l:'PFCs'},{v:'pm',l:'PMs'},{v:'cc',l:'CCs'},{v:'ambassador',l:'Ambassadors'}]}/>
      <Btn onClick={send} full>📢 Send Broadcast</Btn>
    </div>
  );
}

  const pendingVerification=Object.values(users).filter(u=>u.approved&&!u.verified&&u.role!=='founder'&&u.role!=='hr'&&!u.resigned);
  const resigned=Object.values(users).filter(u=>u.resigned&&u.role!=='founder');

  const filtered=allMembers.filter(u=>{
    if(!search)return true;
    const s=search.toLowerCase();
    return(u.name||'').toLowerCase().includes(s)||(u.email||'').toLowerCase().includes(s)||(u.code||'').toLowerCase().includes(s)||(u.phone||'').includes(s);

    return(
      <div>
        {fineTarget&&<Modal title="Fines & Bonuses" onClose={()=>setFineTarget(null)}>
          <FineManager target={fineTarget} users={users} saveUsers={saveUsers} pushNotif={pushNotif}/>
        </Modal>}
        <Sel label="Filter by role" value={filterRole} onChange={e=>setFilterRole(e.target.value)}
          options={[{v:'all',l:'All roles'},{v:'ambassador',l:'Ambassadors'},{v:'cc',l:'CCs'},{v:'pm',l:'PMs'},{v:'pfc',l:'PFCs'}]}/>
        {allMembers.filter(filterRole==='all'?()=>true:u=>u.role===filterRole).map(u=>{
          const{totalDed,totalBon,net}=calcNet(0,u.deductions,u.bonuses);
          return(
            <div key={u.code||u.id} style={{background:'#fff',borderRadius:12,padding:'12px 14px',marginBottom:8,boxShadow:'var(--shadow)'}}>
              <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:8}}>
                <Ava user={u} size={34}/>
                <div style={{flex:1}}>
                  <div style={{fontWeight:700,fontSize:13}}>{u.name}</div>
                  <Bdg role={u.role} small/>
                </div>
                <Btn small onClick={()=>setFineTarget(u.code||u.id)}>Manage</Btn>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:6}}>
                <div style={{background:'#fee2e2',borderRadius:8,padding:'6px',textAlign:'center'}}><div style={{fontSize:12,fontWeight:700,color:'#dc2626'}}>{fmt(totalDed)}</div><div style={{fontSize:10,color:'#dc2626'}}>Fines</div></div>
                <div style={{background:'#dcfce7',borderRadius:8,padding:'6px',textAlign:'center'}}><div style={{fontSize:12,fontWeight:700,color:'var(--green)'}}>{fmt(totalBon)}</div><div style={{fontSize:10,color:'var(--green)'}}>Bonuses</div></div>
                <div style={{background:'#eff6ff',borderRadius:8,padding:'6px',textAlign:'center'}}><div style={{fontSize:12,fontWeight:700,color:'var(--blue)'}}>{fmt(net)}</div><div style={{fontSize:10,color:'var(--blue)'}}>Net</div></div>
              </div>
            </div>
          );
        })}
      </div>
    );
  };

  return(
    <div style={{maxWidth:600,margin:'0 auto',background:'var(--bg)',minHeight:'100vh'}}>
      <DashHeader user={user} onLogout={onLogout} unreadNotif={(user.notifications||[]).filter(n=>!n.read).length}/>
      {ok&&<div style={{background:'#dcfce7',color:'#166534',padding:'10px 16px',fontSize:13,fontWeight:600,textAlign:'center'}}>{ok}</div>}
      <div style={{background:'#fff',padding:'8px 12px',borderBottom:'1px solid var(--border)',position:'sticky',top:68,zIndex:90}}>
        <Tabs tabs={tabs} active={tab} onSelect={setTab}/>
      </div>

      <div style={{padding:'12px 12px 80px'}} className="fade-up">

        {/* ── OVERVIEW ── */}
        {tab==='overview'&&(
          <div style={{display:'flex',flexDirection:'column',gap:12}}>
            <div style={{background:'linear-gradient(135deg,#7c2d12,#ea580c)',borderRadius:16,padding:'20px',color:'#fff'}}>
              <div style={{fontSize:12,opacity:.7,letterSpacing:1,marginBottom:4}}>HR MANAGER</div>
              <div style={{fontWeight:800,fontSize:20,marginBottom:2}}>People & Talent</div>
              <div style={{fontSize:13,opacity:.8}}>{user.name}</div>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
              <StatCard value={allMembers.length} label="Active Members" color="var(--blue)"/>
              <StatCard value={pendingVerification.length} label="Pending Verification" color="#d97706"/>
              <StatCard value={resigned.length} label="Resigned" color="#dc2626"/>
              <StatCard value={allMembers.filter(u=>u.role==='ambassador').length} label="Ambassadors" color="#1B5E20"/>
            </div>
            {/* Role breakdown */}
            <div style={{background:'#fff',borderRadius:14,padding:'14px 16px',boxShadow:'var(--shadow)'}}>
              <div style={{fontWeight:700,fontSize:13,color:'var(--muted)',letterSpacing:.5,marginBottom:10}}>TEAM BREAKDOWN</div>
              {['ambassador','cc','pm','pfc','smm'].map(role=>{
                const count=allMembers.filter(u=>u.role===role).length;
                return(
                  <div key={role} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'7px 0',borderBottom:'1px solid var(--border)'}}>
                    <div style={{display:'flex',alignItems:'center',gap:8}}><Bdg role={role}/><span style={{fontSize:13}}>{ROLE_LABELS[role]}</span></div>
                    <span style={{fontWeight:700,fontSize:14}}>{count}</span>
                  </div>
                );
              })}
            </div>
            {pendingVerification.length>0&&(
              <div style={{background:'#fff7ed',borderRadius:14,padding:'14px 16px',border:'1px solid #fed7aa'}}>
                <div style={{fontWeight:700,fontSize:13,color:'#c2410c',marginBottom:8}}>⏳ {pendingVerification.length} member{pendingVerification.length>1?'s':''} awaiting verification</div>
                {pendingVerification.slice(0,3).map(u=>(
                  <div key={u.id} style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
                    <Ava user={u} size={28}/>
                    <div style={{flex:1,fontSize:13}}>{u.name} <Bdg role={u.role} small/></div>
                    <Btn small onClick={()=>verifyMember(u.id||u.code)}>Verify</Btn>
                  </div>
                ))}
                {pendingVerification.length>3&&<div style={{fontSize:12,color:'var(--muted)',marginTop:4,textAlign:'center'}}
                  onClick={()=>setTab('onboarding')} style={{cursor:'pointer',color:'var(--blue)'}}>See all {pendingVerification.length} →</div>}
              </div>
            )}
          </div>
        )}

        {/* ── MEMBERS ── */}
        {tab==='members'&&(
          <div>
            {detailTarget&&<MemberDetailModal u={detailTarget} onClose={()=>setDetailTarget(null)}/>}
            {fineTarget&&<Modal title="Fines & Bonuses" onClose={()=>setFineTarget(null)}>
              <FineManager target={fineTarget} users={users} saveUsers={saveUsers} pushNotif={pushNotif}/>
            </Modal>}
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search by name, email, code or phone..."
              style={{width:'100%',padding:'11px 13px',border:'1.5px solid var(--border)',borderRadius:10,fontSize:14,outline:'none',background:'#fafbff',marginBottom:10,boxSizing:'border-box'}}/>
            <div style={{fontSize:12,color:'var(--muted)',marginBottom:8}}>{filtered.length} member{filtered.length!==1?'s':''}</div>
            {filtered.map(u=>{
              const mySignups=signups.filter(s=>s.ref===u.code||s.ref===u.id).length;
              const{totalDed,net}=calcNet(0,u.deductions,u.bonuses);
              return(
                <div key={u.code||u.id} style={{background:'#fff',borderRadius:14,padding:'12px 14px',marginBottom:8,boxShadow:'var(--shadow)'}}>
                  <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:8}}>
                    <Ava user={u} size={38}/>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontWeight:700,fontSize:14,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{u.name}</div>
                      <div style={{display:'flex',alignItems:'center',gap:6,marginTop:2}}>
                        <Bdg role={u.role} small/>
                        <span style={{fontSize:11,color:'var(--muted)'}}>{u.code}</span>
                        {!u.verified&&<span style={{fontSize:10,background:'#fef3c7',color:'#92400e',padding:'1px 6px',borderRadius:99,fontWeight:600}}>Unverified</span>}
                      </div>
                    </div>
                    <button onClick={()=>setDetailTarget(u)} style={{background:'var(--bg)',border:'1px solid var(--border)',borderRadius:8,padding:'6px 12px',fontSize:12,cursor:'pointer',fontWeight:600}}>View</button>
                  </div>
                  <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:6}}>
                    <div style={{background:'var(--bg)',borderRadius:8,padding:'6px',textAlign:'center'}}><div style={{fontSize:12,fontWeight:700}}>{mySignups}</div><div style={{fontSize:10,color:'var(--muted)'}}>Sign-ups</div></div>
                    <div style={{background:'#fee2e2',borderRadius:8,padding:'6px',textAlign:'center'}}><div style={{fontSize:12,fontWeight:700,color:'#dc2626'}}>{fmt(totalDed)}</div><div style={{fontSize:10,color:'#dc2626'}}>Fines</div></div>
                    <div style={{background:'#eff6ff',borderRadius:8,padding:'6px',textAlign:'center'}}><div style={{fontSize:12,fontWeight:700,color:'var(--blue)'}}>{fmt(net)}</div><div style={{fontSize:10,color:'var(--blue)'}}>Net</div></div>
                  </div>
                </div>
              );
            })}
            {filtered.length===0&&<div style={{textAlign:'center',color:'var(--muted)',padding:30,fontSize:13}}>No members found.</div>}
          </div>
        )}

        {/* ── ONBOARDING ── */}
        {tab==='onboarding'&&(
          <div>
            <div style={{fontWeight:700,fontSize:15,marginBottom:4}}>📋 Onboarding Queue</div>
            <div style={{fontSize:13,color:'var(--muted)',marginBottom:14}}>Members who've registered but not yet been verified. Verify them once you've confirmed their identity and details.</div>
            {pendingVerification.length===0&&<div style={{textAlign:'center',color:'var(--muted)',padding:30,background:'#fff',borderRadius:14,fontSize:13}}>🎉 No pending verifications — all clear!</div>}
            {pendingVerification.map(u=>(
              <div key={u.id} style={{background:'#fff',borderRadius:14,padding:'14px 16px',marginBottom:8,boxShadow:'var(--shadow)'}}>
                <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:10}}>
                  <Ava user={u} size={42}/>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:700,fontSize:15}}>{u.name}</div>
                    <Bdg role={u.role}/>
                    <div style={{fontSize:12,color:'var(--muted)',marginTop:2}}>Joined {fmtDate(u.joined)}</div>
                  </div>
                </div>
                <div style={{display:'flex',flexDirection:'column',gap:4,marginBottom:12,background:'var(--bg)',borderRadius:10,padding:'10px 12px'}}>
                  {[['Email',u.email],['Phone',u.phone],['State',u.state||'—'],['Bank',u.bank],['Acct No',u.accNum],['Referred By',u.referredBy||'—']].map(([k,v])=>(
                    <div key={k} style={{display:'flex',justifyContent:'space-between',fontSize:12}}>
                      <span style={{color:'var(--muted)'}}>{k}</span><span style={{fontWeight:600}}>{v||'—'}</span>
                    </div>
                  ))}
                </div>
                <Btn full onClick={()=>verifyMember(u.id||u.code)} variant="green">✅ Verify Member</Btn>
              </div>
            ))}
          </div>
        )}

        {/* ── FINES ── */}
        {tab==='fines'&&<FinesTab/>}

        {/* ── INVITE LINKS ── */}
        {tab==='invite'&&<InviteLinks/>}
        {tab==='meetings'&&<HRMeetingTab user={user} users={users} meetings={hrMeetings} saveMeetings={saveHrMeetings}/>}
        {tab==='meetings'&&<HRMeetingTab user={user} users={users} meetings={hrMeetings} saveMeetings={saveHrMeetings}/>}

      </div>
    </div>
  );
}


function App(){
  const appState=useAppState();
  const{screen,setScreen,user,setUser,users,saveUsers}=appState;
  const login=useCallback(u=>{setUser(u);setScreen('dashboard');},[]);
  const logout=useCallback(()=>{setUser(null);setScreen('landing');},[]);
  const nav=useCallback(s=>setScreen(s),[]);

  if(screen==='loading')return <LoadingScreen/>;
  if(screen==='landing')return <Landing onNavigate={nav}/>;
  if(screen==='login')return <LoginScreen users={users} onLogin={login} onNavigate={nav}/>;
  if(screen==='forgot')return <ForgotPassword users={users} saveUsers={saveUsers} onNavigate={nav}/>;
  if(screen==='student')return <StudentReg settings={appState.settings} saveSignups={appState.saveSignups} signups={appState.signups} onNavigate={nav}/>;
  if(screen==='team'){
    const params=new URLSearchParams(window.location.search);
    const rawToken=params.get('invite')||sessionStorage.getItem('pending_invite_token');
    const inviteData=rawToken?appState.inviteTokens[rawToken]:null;
    if(!rawToken||!inviteData){
      return(
        <div style={{minHeight:'100vh',background:'var(--blue)',display:'flex',alignItems:'center',justifyContent:'center',padding:24}}>
          <div style={{background:'#fff',borderRadius:20,padding:32,maxWidth:380,width:'100%',textAlign:'center'}}>
            <div style={{fontSize:48,marginBottom:12}}>🔒</div>
            <div style={{fontWeight:800,fontSize:20,marginBottom:8}}>Invite Required</div>
            <div style={{color:'var(--muted)',fontSize:14,marginBottom:20}}>This registration link is invalid or has already been used. Please ask your team leader to generate a new invite link for you.</div>
            <Btn onClick={()=>nav('landing')} full variant="outline">← Back to Home</Btn>
          </div>
        </div>
      );
    }
    if(inviteData.used){
      return(
        <div style={{minHeight:'100vh',background:'var(--blue)',display:'flex',alignItems:'center',justifyContent:'center',padding:24}}>
          <div style={{background:'#fff',borderRadius:20,padding:32,maxWidth:380,width:'100%',textAlign:'center'}}>
            <div style={{fontSize:48,marginBottom:12}}>⚠️</div>
            <div style={{fontWeight:800,fontSize:20,marginBottom:8}}>Link Already Used</div>
            <div style={{color:'var(--muted)',fontSize:14,marginBottom:20}}>This invite link has already been used for a registration. Please ask your team leader to generate a new one.</div>
            <Btn onClick={()=>nav('landing')} full variant="outline">← Back to Home</Btn>
          </div>
        </div>
      );
    }
    sessionStorage.setItem('pending_invite_token',rawToken);
    sessionStorage.setItem('pending_invite_data',JSON.stringify(inviteData));
    return <TeamReg users={users} saveUsers={appState.saveUsers} inviteToken={rawToken} inviteData={inviteData} saveInviteTokens={appState.saveInviteTokens} inviteTokens={appState.inviteTokens} onNavigate={nav}/>;
  }
  if(screen==='dashboard'&&user){
    if(user.role==='founder')return <FounderDashboard user={user} appState={appState} onLogout={logout}/>;
    if(user.role==='smm')return <SMMDashboard user={user} appState={appState} onLogout={logout}/>;
    if(user.role==='hr')return <HRDashboard user={user} appState={appState} onLogout={logout}/>;
    return <MemberDashboard user={user} appState={appState} onLogout={logout}/>;
  }
  return <Landing onNavigate={nav}/>;
}

// ── PWA INSTALL PROMPT ─────────────────────────────────────────────────────
let _installPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  _installPrompt = e;
  // Show install button immediately when prompt is available
  document.getElementById('install-btn-wrap')&&(document.getElementById('install-btn-wrap').style.display='block');
});

window.addEventListener('appinstalled',()=>{
  _installPrompt=null;
});

function triggerInstall() {
  if (_installPrompt) {
    _installPrompt.prompt();
    _installPrompt.userChoice.then(()=>{ _installPrompt = null; });
  } else {
    // Detect device
    const isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent);
    const isAndroid=/android/i.test(navigator.userAgent);
    if(isIOS){
      alert('📱 Install on iPhone/iPad:\n\n1. Tap the Share button at the bottom (the box with arrow ↑)\n2. Scroll down and tap "Add to Home Screen"\n3. Tap "Add" — done!');
    } else if(isAndroid){
      alert('📱 Install on Android:\n\n1. Tap the 3 dots menu ⋮ at the top right of your browser\n2. Tap "Add to Home screen" or "Install app"\n3. Tap "Install" — done!\n\nIf you don\'t see it, try opening the site in Chrome browser.');
    } else {
      alert('💻 Install on Desktop:\n\nLook for the install icon (⊕) in your browser address bar and click it.');
    }
  }
}

ReactDOM.render(<App/>,document.getElementById('root'));
</script>
<script>
// Register service worker for PWA
if('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js', {scope: './'})
      .then(reg => {
        // Check for updates
        reg.update();
      }).catch(()=>{});
  });
}
</script>
</body>
</html>
